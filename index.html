<html lang="zh-CN">
<head>

    <style>

            margin: 0;

 align-items: center;

<script>
    // ==================== GitHub 配置 ====================
    const GITHUB_TOKEN = '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';
    const GITHUB_USER = 'ponginloi';
    const GITHUB_REPO = 'trading-strategies';
    const GITHUB_API = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents`;
    const GITHUB_RAW = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;

    // DeepSeek API 配置
    const DEEPSEEK_API_KEY = "sk-1f33b84b5ed746d09628b7834fc32170";
    const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";

    // ==================== 辅助函数 ====================
    function encodeToBase64(obj) {
        return btoa(unescape(encodeURIComponent(JSON.stringify(obj, null, 2))));
    }

    async function getFileSha(path) {
        try {
            const response = await fetch(`${GITHUB_API}/${path}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            if (response.status === 404) return null;
            const data = await response.json();
            return data.sha;
        } catch (e) {
            return null;
        }
    }

    async function fetchUserFile(username) {
        try {
            const response = await fetch(`${GITHUB_RAW}/users/${username}.json`);
            if (response.status === 404) return null;
            return await response.json();
        } catch (e) {
            return null;
        }
    }

    async function saveUserFile(username, userData) {
        const path = `users/${username}.json`;
        const existingSha = await getFileSha(path);
        const content = encodeToBase64(userData);
        
        const body = { message: existingSha ? `更新用户 ${username}` : `创建用户 ${username}`, content: content, branch: 'main' };
        if (existingSha) body.sha = existingSha;
        
        const response = await fetch(`${GITHUB_API}/${path}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        return response.ok;
    }

    async function getAllUsers() {
        try {
            const response = await fetch(`${GITHUB_API}/users`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            const data = await response.json();
            if (!Array.isArray(data)) return [];
            const users = [];
            for (const item of data) {
                if (item.name && item.name.endsWith('.json')) {
                    const userData = await fetchUserFile(item.name.replace('.json', ''));
                    if (userData) users.push(userData);
                }
            }
            return users;
        } catch (e) {
            return [];
        }
    }

    // ==================== 用户操作 ====================
    async function registerUser(username, password) {
        if (username.length < 3 || username.length > 20) return { success: false, msg: "用户名长度3-20字符" };
        if (password.length < 4) return { success: false, msg: "密码至少4位" };
        
        const existing = await fetchUserFile(username);
        if (existing) return { success: false, msg: "用户名已存在" };
        
        const newUser = { username, password, watchlist: ["AAPL", "TSLA", "MSFT"], cash: 100000, positions: {}, tradeHistory: [] };
        try {
            await saveUserFile(username, newUser);
            return { success: true };
        } catch (e) {
            return { success: false, msg: "网络错误" };
        }
    }

    async function loginUser(username, password) {
        const userData = await fetchUserFile(username);
        if (!userData) return { success: false, msg: "用户名不存在" };
        if (userData.password !== password) return { success: false, msg: "密码错误" };
        
        sessionStorage.setItem('currentUser', JSON.stringify({
            username: userData.username, watchlist: userData.watchlist, cash: userData.cash, positions: userData.positions
        }));
        return { success: true };
    }

    async function syncUserToGitHub(userData) {
        try {
            const fullUserData = { ...userData };
            await saveUserFile(userData.username, fullUserData);
            sessionStorage.setItem('currentUser', JSON.stringify({
                username: userData.username, watchlist: userData.watchlist, cash: userData.cash, positions: userData.positions
            }));
            return true;
        } catch (e) {
            return false;
        }
    }

    async function getCurrentUserFromGitHub() {
        const sessionData = sessionStorage.getItem('currentUser');
        if (!sessionData) return null;
        const parsed = JSON.parse(sessionData);
        return await fetchUserFile(parsed.username);
    }

    // ==================== 股票数据 ====================
    const stockDB = {
        "AAPL": { name: "Apple Inc.", market: "NASDAQ" }, "TSLA": { name: "Tesla", market: "NASDAQ" },
        "MSFT": { name: "Microsoft", market: "NASDAQ" }, "GOOGL": { name: "Alphabet", market: "NASDAQ" },
        "AMZN": { name: "Amazon", market: "NASDAQ" }, "BTC": { name: "Bitcoin", market: "CRYPTO" },
        "000001": { name: "平安银行", market: "SZSE" }, "600519": { name: "贵州茅台", market: "SSE" }
    };

    function generateKlineData(symbol, days = 40) {
        let basePrice = { "AAPL":175, "TSLA":240, "MSFT":380, "GOOGL":140, "AMZN":130, "BTC":43000, "000001":11.5, "600519":1680 }[symbol] || 50;
        let volatility = symbol === 'BTC' ? 0.03 : 0.018;
        let data = [];
        let currentDate = new Date();
        for (let i = days; i >= 0; i--) {
            let date = new Date(); date.setDate(currentDate.getDate() - i);
            let dateStr = `${date.getMonth()+1}/${date.getDate()}`;
            let open = basePrice * (1 + (Math.random() - 0.5) * volatility);
            let close = open * (1 + (Math.random() - 0.5) * volatility);
            let high = Math.max(open, close) * (1 + Math.random() * volatility * 0.8);
            let low = Math.min(open, close) * (1 - Math.random() * volatility * 0.8);
            data.push([dateStr, open, close, low, high]);
            basePrice = close;
        }
        return data;
    }

    let klineCache = {};
    function getKline(symbol) {
        if (!klineCache[symbol]) klineCache[symbol] = generateKlineData(symbol, 35);
        return klineCache[symbol];
    }
    function getCurrentPrice(symbol) { return getKline(symbol).slice(-1)[0][2]; }
    function getChangePercent(symbol) {
        const k = getKline(symbol);
        if (k.length < 2) return 0;
        return ((k[k.length-1][2] - k[k.length-2][2]) / k[k.length-2][2] * 100).toFixed(2);
    }

    // 计算用户总资产
    function calculateTotalAsset(userData) {
        if (!userData) return 0;
        const positionsValue = Object.entries(userData.positions || {}).reduce((sum, [sym, pos]) => sum + pos.quantity * getCurrentPrice(sym), 0);
        return (userData.cash || 0) + positionsValue;
    }

    // 计算投资统计
    function calculateStats(userData) {
        let totalCost = 0, totalValue = 0;
        Object.entries(userData.positions || {}).forEach(([sym, pos]) => {
            totalCost += pos.quantity * pos.avgCost;
            totalValue += pos.quantity * getCurrentPrice(sym);
        });
        const totalProfit = totalValue - totalCost;
        const profitRate = totalCost > 0 ? (totalProfit / totalCost * 100) : 0;
        
        let bestStock = { sym: '-', profit: -Infinity };
        Object.entries(userData.positions || {}).forEach(([sym, pos]) => {
            const profit = pos.quantity * (getCurrentPrice(sym) - pos.avgCost);
            if (profit > bestStock.profit) bestStock = { sym, profit };
        });
        
        return { totalProfit, profitRate, bestStock: bestStock.profit > 0 ? bestStock.sym : '-' };
    }

    // ==================== 排行榜 ====================
    async function renderRanking() {
        const container = document.getElementById('rankContainer');
        if (!container) return;
        container.innerHTML = '<div class="loading-spinner">加载排行榜...</div>';
        
        const users = await getAllUsers();
        const currentUsername = sessionStorage.getItem('currentUser') ? JSON.parse(sessionStorage.getItem('currentUser')).username : null;
        
        const rankings = users.map(user => ({
            username: user.username,
            totalAsset: calculateTotalAsset(user)
        })).sort((a, b) => b.totalAsset - a.totalAsset);
        
        if (rankings.length === 0) {
            container.innerHTML = '<div style="padding:16px;text-align:center;color:#aaa;">暂无其他用户</div>';
            return;
        }
        
        let html = '';
        rankings.slice(0, 10).forEach((user, idx) => {
            const isCurrent = user.username === currentUsername;
            html += `<div class="${isCurrent ? 'rank-current' : 'rank-item'}">
                        <span class="rank-number">${idx + 1}</span>
                        <span class="rank-name">${user.username}${isCurrent ? ' (你)' : ''}</span>
                        <span class="rank-asset">$${user.totalAsset.toFixed(2)}</span>
                    </div>`;
        });
        container.innerHTML = html;
    }

    // ==================== DeepSeek AI 教学 ====================
    async function getAIAdvice() {
        const userData = await getCurrentUserFromGitHub();
        if (!userData) return "请先登录";
        
        const totalAsset = calculateTotalAsset(userData);
        const stats = calculateStats(userData);
        const positions = userData.positions || {};
        
        let positionsStr = Object.keys(positions).length === 0 ? "暂无持仓" : 
            Object.entries(positions).map(([sym, pos]) => {
                const currentPx = getCurrentPrice(sym);
                const profit = (currentPx - pos.avgCost) * pos.quantity;
                return `${sym}: ${pos.quantity}股, 成本$${pos.avgCost}, 现价$${currentPx}, 盈亏$${profit.toFixed(2)}`;
            }).join('\n');
        
        const prompt = `你是一位专业的股票投资顾问。请基于以下用户数据给出简短的投资建议（100字以内）：

用户总资产: $${totalAsset.toFixed(2)}
总盈亏: $${stats.totalProfit.toFixed(2)} (${stats.profitRate.toFixed(2)}%)
持仓情况:
${positionsStr}

请给出：1) 风险评估 2) 操作建议 3) 投资心态提醒。要求专业、简洁、实用。`;
        
        try {
            const response = await fetch(DEEPSEEK_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [{ role: 'user', content: prompt }],
                    temperature: 0.7,
                    max_tokens: 500
                })
            });
            
            const data = await response.json();
            if (data.choices && data.choices[0]) {
                return data.choices[0].message.content;
            } else {
                return "AI 服务暂时不可用，请稍后再试。";
            }
        } catch (error) {
            console.error('AI 调用失败:', error);
            return "网络错误，无法获取 AI 建议。";
        }
    }

    // ==================== UI 渲染 ====================
    let currentActiveSymbol = "AAPL";
    let chartInstance = null;
    let currentUserData = null;

    async function renderPortfolio() {
        if (!currentUserData) return;
        const positions = currentUserData.positions || {};
        const container = document.getElementById('positionsContainer');
        if (Object.keys(positions).length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#aaa;padding:12px;">暂无持仓</div>';
        } else {
            let html = '';
            for (const [sym, pos] of Object.entries(positions)) {
                const currentPx = getCurrentPrice(sym);
                const profit = (currentPx - pos.avgCost) * pos.quantity;
                html += `<div class="position-item"><div><strong>${sym}</strong><br>${pos.quantity}股</div>
                        <div style="text-align:right;">$${currentPx.toFixed(2)}<br>
                        <span class="${profit>=0?'positive':'negative'}">${profit>=0?'+':''}$${profit.toFixed(2)}</span></div></div>`;
            }
            container.innerHTML = html;
        }
        
        const totalAsset = calculateTotalAsset(currentUserData);
        document.getElementById('totalAsset').innerHTML = `$${totalAsset.toFixed(2)}`;
        document.getElementById('availableCash').innerHTML = `$${currentUserData.cash.toFixed(2)}`;
        
        // 更新统计
        const stats = calculateStats(currentUserData);
        document.getElementById('totalProfit').innerHTML = `${stats.totalProfit>=0?'+':''}$${stats.totalProfit.toFixed(2)}`;
        document.getElementById('bestStock').innerHTML = stats.bestStock;
        
        // 今日盈亏（模拟，基于最近价格变化）
        let todayProfit = 0;
        Object.entries(positions).forEach(([sym, pos]) => {
            const change = parseFloat(getChangePercent(sym));
            todayProfit += pos.quantity * getCurrentPrice(sym) * (change / 100);
        });
        document.getElementById('todayProfit').innerHTML = `${todayProfit>=0?'+':''}$${todayProfit.toFixed(2)}`;
        document.getElementById('todayProfit').className = todayProfit >= 0 ? 'positive' : 'negative';
        
        let winRate = 0;
        if (currentUserData.tradeHistory && currentUserData.tradeHistory.length > 0) {
            const wins = currentUserData.tradeHistory.filter(t => t.profit > 0).length;
            winRate = (wins / currentUserData.tradeHistory.length * 100).toFixed(0);
        }
        document.getElementById('winRate').innerHTML = `${winRate}%`;
    }

    function renderWatchlist() {
        const container = document.getElementById('watchlistContainer');
        if (!currentUserData?.watchlist?.length) {
            container.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;">暂无自选，去搜索添加</div>';
            return;
        }
        container.innerHTML = '';
        currentUserData.watchlist.forEach(sym => {
            const price = getCurrentPrice(sym);
            const change = getChangePercent(sym);
            const div = document.createElement('div');
            div.className = `watchlist-item ${currentActiveSymbol === sym ? 'active' : ''}`;
            div.innerHTML = `<div><div class="watchlist-symbol">${sym}</div><div style="font-size:0.7rem;color:#aaa;">${stockDB[sym]?.name || ''}</div></div>
                            <div style="text-align:right;"><div class="watchlist-price">$${price.toFixed(2)}</div>
                            <div class="${parseFloat(change)>=0?'positive':'negative'}">${parseFloat(change)>=0?'+':''}${change}%</div></div>
                            <button class="remove-stock" data-symbol="${sym}">✕</button>`;
            div.addEventListener('click', (e) => { if (!e.target.classList.contains('remove-stock')) { currentActiveSymbol = sym; renderWatchlist(); renderChart(sym); updateCurrentDisplay(); } });
            div.querySelector('.remove-stock').addEventListener('click', async (e) => {
                e.stopPropagation();
                currentUserData.watchlist = currentUserData.watchlist.filter(s => s !== sym);
                await syncUserToGitHub(currentUserData);
                if (currentActiveSymbol === sym && currentUserData.watchlist.length) currentActiveSymbol = currentUserData.watchlist[0];
                renderWatchlist();
                if (currentActiveSymbol) { renderChart(currentActiveSymbol); updateCurrentDisplay(); }
                await renderRanking();
            });
            container.appendChild(div);
        });
    }

    function renderChart(symbol) {
        const kdata = getKline(symbol);
        if (chartInstance) chartInstance.dispose();
        const dom = document.getElementById('klineChart');
        chartInstance = echarts.init(dom);
        chartInstance.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: kdata.map(v => v[0]), axisLabel: { rotate: 30, color: '#aaa' } },
            yAxis: { scale: true, axisLabel: { color: '#ddd' } },
            series: [{ type: 'candlestick', data: kdata.map(v => [v[1], v[2], v[3], v[4]]), itemStyle: { color: '#00c853', color0: '#ff3b30' } }],
            backgroundColor: 'transparent'
        });
    }

    function updateCurrentDisplay() {
        document.getElementById('currentSymbol').innerText = currentActiveSymbol;
        document.getElementById('currentPrice').innerText = `$${getCurrentPrice(currentActiveSymbol).toFixed(2)}`;
        const change = getChangePercent(currentActiveSymbol);
        document.getElementById('currentChange').innerHTML = `${parseFloat(change)>=0?'+':''}${change}%`;
        document.getElementById('currentChange').className = parseFloat(change) >= 0 ? 'positive' : 'negative';
        document.getElementById('tradeSymbol').innerHTML = `当前: ${currentActiveSymbol} $${getCurrentPrice(currentActiveSymbol).toFixed(2)}`;
    }

    async function executeTrade(symbol, type, quantity) {
        if (!currentUserData) return "用户未登录";
        const price = getCurrentPrice(symbol);
        if (isNaN(quantity) || quantity <= 0) return "请输入有效数量";
        
        if (type === 'buy') {
            const cost = price * quantity;
            if (currentUserData.cash < cost) return `资金不足，需要 $${cost.toFixed(2)}`;
            currentUserData.cash -= cost;
            if (!currentUserData.positions[symbol]) currentUserData.positions[symbol] = { quantity: 0, avgCost: 0 };
            const pos = currentUserData.positions[symbol];
            const newQuantity = pos.quantity + quantity;
            pos.avgCost = (pos.quantity * pos.avgCost + cost) / newQuantity;
            pos.quantity = newQuantity;
            await syncUserToGitHub(currentUserData);
            await renderPortfolio();
            await renderRanking();
            return `✅ 成功买入 ${quantity} 股 ${symbol} @ $${price.toFixed(2)}`;
        } else if (type === 'sell') {
            const pos = currentUserData.positions[symbol];
            if (!pos || pos.quantity < quantity) return `持仓不足，当前持有 ${pos?.quantity || 0} 股`;
            const revenue = price * quantity;
            currentUserData.cash += revenue;
            pos.quantity -= quantity;
            if (pos.quantity === 0) delete currentUserData.positions[symbol];
            await syncUserToGitHub(currentUserData);
            await renderPortfolio();
            await renderRanking();
            return `✅ 成功卖出 ${quantity} 股 ${symbol} @ $${price.toFixed(2)}`;
        }
        return "无效操作";
    }

    async function addToWatchlist(symbol) {
        if (!currentUserData.watchlist.includes(symbol)) {
            currentUserData.watchlist.push(symbol);
            await syncUserToGitHub(currentUserData);
            renderWatchlist();
            return true;
        }
        return false;
    }

    function performSearch(query) {
        const upper = query.toUpperCase();
        return Object.keys(stockDB).filter(s => s.toUpperCase().includes(upper) || stockDB[s].name.toUpperCase().includes(upper));
    }

    function renderSearchResults(results) {
        const container = document.getElementById('searchResults');
        if (!results.length) { container.classList.remove('show'); return; }
        container.innerHTML = results.map(sym => `<div class="search-result-item" data-symbol="${sym}"><span>${sym}</span><span style="font-size:0.7rem;">${stockDB[sym].name}</span></div>`).join('');
        container.querySelectorAll('.search-result-item').forEach(el => {
            el.addEventListener('click', () => {
                const sym = el.getAttribute('data-symbol');
                currentActiveSymbol = sym;
                renderChart(sym);
                updateCurrentDisplay();
                renderWatchlist();
                document.getElementById('globalSearchInput').value = '';
                container.classList.remove('show');
            });
        });
        container.classList.add('show');
    }

    async function initAfterLogin(username) {
        currentUserData = await fetchUserFile(username);
        if (!currentUserData) return;
        document.getElementById('displayUsername').innerText = username;
        document.getElementById('tradingApp').style.display = 'block';
        document.getElementById('authOverlay').style.display = 'none';
        
        currentActiveSymbol = currentUserData.watchlist?.length ? currentUserData.watchlist[0] : "AAPL";
        renderChart(currentActiveSymbol);
        updateCurrentDisplay();
        renderWatchlist();
        await renderPortfolio();
        await renderRanking();
        
        document.getElementById('addCurrentToWatchlist').onclick = () => addToWatchlist(currentActiveSymbol);
        document.getElementById('refreshRankBtn').onclick = () => renderRanking();
        document.getElementById('logoutBtn').onclick = () => { sessionStorage.removeItem('currentUser'); document.getElementById('authOverlay').style.display = 'flex'; document.getElementById('tradingApp').style.display = 'none'; };
        document.getElementById('buyBtn').onclick = async () => { const msg = await executeTrade(currentActiveSymbol, 'buy', parseFloat(document.getElementById('tradeQuantity').value)); document.getElementById('tradeMessage').innerText = msg; setTimeout(() => document.getElementById('tradeMessage').innerText = '', 3000); renderWatchlist(); updateCurrentDisplay(); };
        document.getElementById('sellBtn').onclick = async () => { const msg = await executeTrade(currentActiveSymbol, 'sell', parseFloat(document.getElementById('tradeQuantity').value)); document.getElementById('tradeMessage').innerText = msg; setTimeout(() => document.getElementById('tradeMessage').innerText = '', 3000); renderWatchlist(); updateCurrentDisplay(); };
        document.getElementById('askAiBtn').onclick = async () => { const aiDiv = document.getElementById('aiMessage'); aiDiv.innerHTML = '<div class="ai-loading">🤖 AI 正在分析你的投资组合...</div>'; const advice = await getAIAdvice(); aiDiv.innerHTML = advice; };
        
        const searchInput = document.getElementById('globalSearchInput');
        searchInput.addEventListener('input', (e) => { const val = e.target.value.trim(); if (!val) { document.getElementById('searchResults').classList.remove('show'); return; } renderSearchResults(performSearch(val).slice(0, 6)); });
        document.addEventListener('click', (e) => { if (!searchInput.contains(e.target)) document.getElementById('searchResults').classList.remove('show'); });
    }

    function bindAuthEvents() {
        const loginTab = document.querySelector('[data-tab="login"]'), regTab = document.querySelector('[data-tab="register"]');
        const loginDiv = document.getElementById('loginForm'), regDiv = document.getElementById('registerForm');
        loginTab.onclick = () => { loginTab.classList.add('active'); regTab.classList.remove('active'); loginDiv.style.display = 'flex'; regDiv.style.display = 'none'; };
        regTab.onclick = () => { regTab.classList.add('active'); loginTab.classList.remove('active'); loginDiv.style.display = 'none'; regDiv.style.display = 'flex'; };
        
        document.getElementById('doLoginBtn').onclick = async () => {
            const res = await loginUser(document.getElementById('loginUsername').value.trim(), document.getElementById('loginPassword').value);
            if (res.success) await initAfterLogin(document.getElementById('loginUsername').value.trim());
            else document.getElementById('loginError').innerText = res.msg;
        };
        document.getElementById('doRegisterBtn').onclick = async () => {
            const res = await registerUser(document.getElementById('regUsername').value.trim(), document.getElementById('regPassword').value);
            if (res.success) alert("注册成功，请登录");
            else document.getElementById('regError').innerText = res.msg;
        };
    }

    async function checkSession() {
        const saved = sessionStorage.getItem('currentUser');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (await fetchUserFile(parsed.username)) await initAfterLogin(parsed.username);
            else sessionStorage.removeItem('currentUser');
        }
    }

    bindAuthEvents();
    checkSession();
</script>
</body>
