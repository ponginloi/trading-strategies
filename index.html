<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TradeWise Pro | 智能交易 + 模拟交易系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow-x: hidden;
        }

        /* 登录/注册覆盖层 */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .auth-modal {
            background: #12163c;
            border-radius: 32px;
            width: 420px;
            max-width: 90%;
            padding: 32px 28px;
            border: 1px solid rgba(79, 70, 229, 0.5);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
        }

        .auth-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .auth-tab {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 8px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .auth-tab.active {
            color: #4f46e5;
            border-bottom: 2px solid #4f46e5;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .auth-form input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 14px 18px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .auth-form input:focus {
            border-color: #4f46e5;
        }

        .auth-btn {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .auth-btn:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .auth-error {
            color: #ff6b6b;
            font-size: 0.8rem;
            text-align: center;
        }

        /* 主交易界面 (初始隐藏) */
        .trading-app {
            display: none;
        }

        .trading-container {
            display: grid;
            grid-template-columns: 320px 1fr 340px;
            gap: 1px;
            background: rgba(255, 255, 255, 0.05);
            min-height: 100vh;
        }

        .top-nav {
            grid-column: 1/-1;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .market-status {
            font-size: 0.75rem;
            padding: 4px 12px;
            background: rgba(0, 200, 83, 0.2);
            border-radius: 20px;
            color: #00c853;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 6px 16px;
        }

        .search-input-wrapper:focus-within {
            border-color: #4f46e5;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 0.85rem;
            padding: 8px 0;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-clear {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 1rem;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(20, 24, 49, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 8px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .search-results.show {
            display: block;
        }

        .search-result-item {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-result-item:hover {
            background: rgba(79, 70, 229, 0.3);
        }

        .result-symbol {
            font-weight: 600;
        }

        .result-name {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-name {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .left-panel {
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            height: calc(100vh - 60px);
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-to-watchlist-btn {
            background: rgba(79, 70, 229, 0.3);
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            color: #4f46e5;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .watchlist-item {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .watchlist-item:hover {
            background: rgba(79, 70, 229, 0.2);
        }

        .watchlist-item.active {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.3), rgba(0, 200, 83, 0.1));
            border-left: 3px solid #4f46e5;
        }

        .watchlist-item-info {
            flex: 1;
        }

        .watchlist-symbol {
            font-weight: 600;
        }

        .watchlist-name {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .watchlist-quote {
            text-align: right;
        }

        .watchlist-price {
            font-weight: 600;
        }

        .watchlist-change {
            font-size: 0.7rem;
        }

        .remove-stock {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            margin-left: 8px;
            opacity: 0;
        }

        .watchlist-item:hover .remove-stock {
            opacity: 1;
        }

        .remove-stock:hover {
            color: #ff3b30;
        }

        .positive {
            color: #00c853;
        }

        .negative {
            color: #ff3b30;
        }

        .center-panel {
            background: rgba(10, 14, 39, 0.6);
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .current-symbol {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .chart-container {
            flex: 1;
            min-height: 450px;
            width: 100%;
            padding: 12px;
        }

        .right-panel {
            background: rgba(10, 14, 39, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
        }

        .trade-card {
            background: rgba(79, 70, 229, 0.15);
            border: 1px solid rgba(79, 70, 229, 0.3);
        }

        .trade-input-group {
            display: flex;
            gap: 12px;
            margin: 12px 0;
            align-items: center;
            flex-wrap: wrap;
        }

        .trade-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 8px 12px;
            color: white;
            flex: 1;
            min-width: 100px;
        }

        .trade-buttons {
            display: flex;
            gap: 12px;
        }

        .buy-btn {
            background: #00c853;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .sell-btn {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .position-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
        }

        .asset-summary {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logout-btn {
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid rgba(255, 59, 48, 0.5);
        }

        .logout-btn:hover {
            background: rgba(255, 59, 48, 0.4);
        }
    </style>
</head>
<body>

<!-- 登录/注册模态框 -->
<div id="authOverlay" class="auth-overlay">
    <div class="auth-modal">
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">登录</button>
            <button class="auth-tab" data-tab="register">注册</button>
        </div>
        <div id="loginForm" class="auth-form">
            <input type="text" id="loginUsername" placeholder="用户名" autocomplete="username">
            <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
            <button class="auth-btn" id="doLoginBtn">登录 TradeWise</button>
            <div id="loginError" class="auth-error"></div>
        </div>
        <div id="registerForm" class="auth-form" style="display: none;">
            <input type="text" id="regUsername" placeholder="用户名 (3~20字符)">
            <input type="password" id="regPassword" placeholder="密码 (最小4位)">
            <button class="auth-btn" id="doRegisterBtn">创建账户</button>
            <div id="regError" class="auth-error"></div>
        </div>
    </div>
</div>

<!-- 主交易界面 -->
<div id="tradingApp" class="trading-app">
    <div class="trading-container">
        <div class="top-nav">
            <div class="logo">📈 TradeWise Pro · 模拟交易</div>
            <div class="market-status">🟢 模拟环境 | 即时成交</div>
            <div class="search-container">
                <div class="search-input-wrapper">
                    <input type="text" id="globalSearchInput" class="search-input" placeholder="搜索股票 (AAPL, TSLA, 000001)...">
                    <button class="search-clear" id="clearSearchBtn">✕</button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="user-controls">
                <span class="user-name" id="displayUsername">用户</span>
                <button id="logoutBtn" class="btn-icon logout-btn">退出</button>
            </div>
        </div>

        <!-- 左侧自选股 -->
        <div class="left-panel">
            <div class="panel-header">
                <span>⭐ 自选股</span>
                <button id="addCurrentToWatchlist" class="add-to-watchlist-btn">+ 添加当前</button>
            </div>
            <div id="watchlistContainer"></div>
        </div>

        <!-- 中心K线图区域 -->
        <div class="center-panel">
            <div class="chart-header">
                <div>
                    <span class="current-symbol" id="currentSymbol">AAPL</span>
                    <span id="currentPrice" style="margin-left: 12px; font-size: 1.2rem;">$---</span>
                </div>
                <div>
                    <span id="currentChange" class="positive">0.00%</span>
                </div>
            </div>
            <div id="klineChart" class="chart-container"></div>
        </div>

        <!-- 右侧交易面板 -->
        <div class="right-panel">
            <div class="info-card trade-card">
                <h4>💰 模拟交易</h4>
                <div id="tradeSymbol" style="font-weight: bold; margin: 8px 0;">当前: AAPL</div>
                <div class="trade-input-group">
                    <input type="number" id="tradeQuantity" placeholder="数量" class="trade-input" value="1" step="1" min="0.01">
                    <div class="trade-buttons">
                        <button id="buyBtn" class="buy-btn">买入</button>
                        <button id="sellBtn" class="sell-btn">卖出</button>
                    </div>
                </div>
                <div id="tradeMessage" style="font-size: 0.75rem; color: #ffaa44; margin-top: 6px;"></div>
            </div>

            <div class="info-card">
                <h4>💼 我的持仓</h4>
                <div id="positionsContainer">加载中...</div>
                <div class="asset-summary">
                    <span>总资产</span>
                    <span id="totalAsset">$0.00</span>
                </div>
                <div class="asset-summary">
                    <span>可用资金</span>
                    <span id="availableCash">$0.00</span>
                </div>
            </div>

            <div class="info-card">
                <h4>📊 市场快讯</h4>
                <p style="font-size: 0.8rem; margin-top: 8px;">模拟交易即时成交，无手续费<br>价格基于最新K线收盘价</p>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 用户 JSON 存储 (localStorage 模拟仓库) ----------
    const USERS_DB_KEY = 'tradewise_users_db';
    function initUserDatabase() {
        if (!localStorage.getItem(USERS_DB_KEY)) {
            const defaultUsers = [
                { username: "demo", password: "demo123", watchlist: ["AAPL", "TSLA", "MSFT"], cash: 100000, positions: {} }
            ];
            localStorage.setItem(USERS_DB_KEY, JSON.stringify(defaultUsers));
        }
    }
    function getUsers() { return JSON.parse(localStorage.getItem(USERS_DB_KEY)) || []; }
    function saveUsers(users) { localStorage.setItem(USERS_DB_KEY, JSON.stringify(users)); }
    function findUser(username) { return getUsers().find(u => u.username === username); }
    
    function registerUser(username, password) {
        const users = getUsers();
        if (users.find(u => u.username === username)) return { success: false, msg: "用户名已存在" };
        if (username.length < 3 || username.length > 20) return { success: false, msg: "用户名长度3-20字符" };
        if (password.length < 4) return { success: false, msg: "密码至少4位" };
        const newUser = { username, password, watchlist: ["AAPL", "TSLA", "MSFT"], cash: 100000, positions: {} };
        users.push(newUser);
        saveUsers(users);
        return { success: true };
    }
    
    function loginUser(username, password) {
        const user = findUser(username);
        if (user && user.password === password) {
            sessionStorage.setItem('currentUser', JSON.stringify({ username: user.username, watchlist: user.watchlist, cash: user.cash, positions: user.positions }));
            return { success: true };
        }
        return { success: false, msg: "用户名或密码错误" };
    }
    
    function getCurrentUser() {
        const data = sessionStorage.getItem('currentUser');
        return data ? JSON.parse(data) : null;
    }
    
    function syncUserToStorage(userData) {
        const users = getUsers();
        const idx = users.findIndex(u => u.username === userData.username);
        if (idx !== -1) {
            users[idx] = userData;
            saveUsers(users);
            sessionStorage.setItem('currentUser', JSON.stringify({ username: userData.username, watchlist: userData.watchlist, cash: userData.cash, positions: userData.positions }));
            return true;
        }
        return false;
    }
    
    function updateCurrentUserWatchlist(newWatchlist) {
        const cur = getCurrentUser();
        if (!cur) return false;
        const fullUser = findUser(cur.username);
        if (fullUser) {
            fullUser.watchlist = newWatchlist;
            syncUserToStorage(fullUser);
            return true;
        }
        return false;
    }
    
    function logout() {
        sessionStorage.removeItem('currentUser');
        document.getElementById('authOverlay').style.display = 'flex';
        document.getElementById('tradingApp').style.display = 'none';
    }

    // ---------- 股票数据模拟 ----------
    const stockDB = {
        "AAPL": { name: "Apple Inc.", market: "NASDAQ" },
        "TSLA": { name: "Tesla, Inc.", market: "NASDAQ" },
        "MSFT": { name: "Microsoft", market: "NASDAQ" },
        "GOOGL": { name: "Alphabet", market: "NASDAQ" },
        "AMZN": { name: "Amazon", market: "NASDAQ" },
        "BTC": { name: "Bitcoin", market: "CRYPTO" },
        "000001": { name: "平安银行", market: "SZSE" },
        "600519": { name: "贵州茅台", market: "SSE" }
    };
    
    function generateKlineData(symbol, days = 40) {
        let basePrice = 100;
        if (symbol === 'AAPL') basePrice = 175;
        else if (symbol === 'TSLA') basePrice = 240;
        else if (symbol === 'MSFT') basePrice = 380;
        else if (symbol === 'GOOGL') basePrice = 140;
        else if (symbol === 'AMZN') basePrice = 130;
        else if (symbol === 'BTC') basePrice = 43000;
        else if (symbol === '000001') basePrice = 11.5;
        else if (symbol === '600519') basePrice = 1680;
        else basePrice = 50;
        let volatility = symbol === 'BTC' ? 0.03 : 0.018;
        let data = [];
        let currentDate = new Date();
        for (let i = days; i >= 0; i--) {
            let date = new Date();
            date.setDate(currentDate.getDate() - i);
            let dateStr = `${date.getMonth()+1}/${date.getDate()}`;
            let open = basePrice * (1 + (Math.random() - 0.5) * volatility);
            let close = open * (1 + (Math.random() - 0.5) * volatility);
            let high = Math.max(open, close) * (1 + Math.random() * volatility * 0.8);
            let low = Math.min(open, close) * (1 - Math.random() * volatility * 0.8);
            data.push([dateStr, open, close, low, high]);
            basePrice = close;
        }
        return data;
    }
    let klineCache = {};
    function getKline(symbol) {
        if (!klineCache[symbol]) klineCache[symbol] = generateKlineData(symbol, 35);
        return klineCache[symbol];
    }
    function getCurrentPrice(symbol) {
        const k = getKline(symbol);
        return k.length ? k[k.length-1][2] : 100;
    }
    function getChangePercent(symbol) {
        const k = getKline(symbol);
        if (k.length < 2) return 0;
        return ((k[k.length-1][2] - k[k.length-2][2]) / k[k.length-2][2] * 100).toFixed(2);
    }

    // 全局变量
    let currentActiveSymbol = "AAPL";
    let chartInstance = null;
    let currentUserWatchlist = [];
    let currentUserData = null;  // 存储完整用户数据 { username, cash, positions, watchlist }
    
    // 更新右侧持仓UI
    function renderPortfolio() {
        if (!currentUserData) return;
        const positions = currentUserData.positions || {};
        const container = document.getElementById('positionsContainer');
        if (!container) return;
        const hasPositions = Object.keys(positions).length > 0;
        if (!hasPositions) {
            container.innerHTML = '<div style="text-align:center;color:#aaa;padding:12px;">暂无持仓，请买入股票</div>';
        } else {
            let html = '';
            for (const [sym, pos] of Object.entries(positions)) {
                const currentPx = getCurrentPrice(sym);
                const marketValue = pos.quantity * currentPx;
                const costValue = pos.quantity * pos.avgCost;
                const profit = marketValue - costValue;
                const profitPct = (profit / costValue * 100).toFixed(2);
                html += `<div class="position-item">
                            <div><strong>${sym}</strong><br><span style="font-size:0.7rem;">${pos.quantity}股</span></div>
                            <div style="text-align:right;">
                                <div>$${currentPx.toFixed(2)}</div>
                                <div class="${profit>=0?'positive':'negative'}">${profit>=0?'+':''}$${profit.toFixed(2)} (${profitPct}%)</div>
                            </div>
                         </div>`;
            }
            container.innerHTML = html;
        }
        const totalAsset = currentUserData.cash + Object.entries(currentUserData.positions).reduce((sum, [sym, pos]) => sum + pos.quantity * getCurrentPrice(sym), 0);
        document.getElementById('totalAsset').innerHTML = `$${totalAsset.toFixed(2)}`;
        document.getElementById('availableCash').innerHTML = `$${currentUserData.cash.toFixed(2)}`;
    }
    
    // 执行交易
    function executeTrade(symbol, type, quantity) {
        if (!currentUserData) return "用户未登录";
        const price = getCurrentPrice(symbol);
        if (isNaN(quantity) || quantity <= 0) return "请输入有效数量";
        if (type === 'buy') {
            const cost = price * quantity;
            if (currentUserData.cash < cost) return `资金不足，需要 $${cost.toFixed(2)}`;
            currentUserData.cash -= cost;
            if (!currentUserData.positions[symbol]) currentUserData.positions[symbol] = { quantity: 0, avgCost: 0 };
            const pos = currentUserData.positions[symbol];
            const newQuantity = pos.quantity + quantity;
            const newAvgCost = (pos.quantity * pos.avgCost + cost) / newQuantity;
            pos.quantity = newQuantity;
            pos.avgCost = newAvgCost;
            syncUserToStorage(currentUserData);
            renderPortfolio();
            return `成功买入 ${quantity} 股 ${symbol} @ $${price.toFixed(2)}`;
        } else if (type === 'sell') {
            const pos = currentUserData.positions[symbol];
            if (!pos || pos.quantity < quantity) return `持仓不足，当前持有 ${pos?.quantity || 0} 股`;
            const revenue = price * quantity;
            currentUserData.cash += revenue;
            pos.quantity -= quantity;
            if (pos.quantity === 0) delete currentUserData.positions[symbol];
            syncUserToStorage(currentUserData);
            renderPortfolio();
            return `成功卖出 ${quantity} 股 ${symbol} @ $${price.toFixed(2)}`;
        }
        return "无效操作";
    }
    
    // 刷新UI (自选&K线)
    function renderWatchlist() {
        const container = document.getElementById('watchlistContainer');
        if (!container) return;
        if (!currentUserWatchlist.length) {
            container.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;">暂无自选，去搜索添加</div>';
            return;
        }
        container.innerHTML = '';
        currentUserWatchlist.forEach(sym => {
            const price = getCurrentPrice(sym);
            const change = parseFloat(getChangePercent(sym));
            const changeStr = (change > 0 ? '+' : '') + change.toFixed(2) + '%';
            const changeClass = change >= 0 ? 'positive' : 'negative';
            const div = document.createElement('div');
            div.className = `watchlist-item ${currentActiveSymbol === sym ? 'active' : ''}`;
            div.innerHTML = `
                <div class="watchlist-item-info">
                    <div class="watchlist-symbol">${sym}</div>
                    <div class="watchlist-name">${stockDB[sym]?.name || sym}</div>
                </div>
                <div class="watchlist-quote">
                    <div class="watchlist-price">$${price.toFixed(2)}</div>
                    <div class="watchlist-change ${changeClass}">${changeStr}</div>
                </div>
                <button class="remove-stock" data-symbol="${sym}">✕</button>
            `;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('remove-stock')) return;
                currentActiveSymbol = sym;
                renderWatchlist();
                renderChart(sym);
                document.getElementById('currentSymbol').innerText = sym;
                document.getElementById('tradeSymbol').innerHTML = `当前: ${sym} $${getCurrentPrice(sym).toFixed(2)}`;
                document.getElementById('tradeMessage').innerText = '';
            });
            const removeBtn = div.querySelector('.remove-stock');
            removeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const newList = currentUserWatchlist.filter(s => s !== sym);
                if (updateCurrentUserWatchlist(newList)) {
                    currentUserWatchlist = newList;
                    if (currentActiveSymbol === sym && currentUserWatchlist.length) {
                        currentActiveSymbol = currentUserWatchlist[0];
                        renderChart(currentActiveSymbol);
                        document.getElementById('currentSymbol').innerText = currentActiveSymbol;
                        document.getElementById('tradeSymbol').innerHTML = `当前: ${currentActiveSymbol} $${getCurrentPrice(currentActiveSymbol).toFixed(2)}`;
                    } else if (currentUserWatchlist.length === 0) {
                        currentActiveSymbol = "AAPL";
                        renderChart("AAPL");
                        document.getElementById('currentSymbol').innerText = "AAPL";
                        document.getElementById('tradeSymbol').innerHTML = `当前: AAPL $${getCurrentPrice("AAPL").toFixed(2)}`;
                    }
                    renderWatchlist();
                }
            });
            container.appendChild(div);
        });
    }
    
    function renderChart(symbol) {
        const kdata = getKline(symbol);
        const dates = kdata.map(item => item[0]);
        const values = kdata.map(item => [item[1], item[2], item[3], item[4]]);
        if (chartInstance) chartInstance.dispose();
        const dom = document.getElementById('klineChart');
        chartInstance = echarts.init(dom);
        chartInstance.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            xAxis: { type: 'category', data: dates, axisLabel: { rotate: 30, color: '#aaa' } },
            yAxis: { scale: true, axisLabel: { color: '#ddd' }, splitLine: { lineStyle: { color: '#222' } } },
            series: [{
                type: 'candlestick', data: values,
                itemStyle: { color: '#00c853', color0: '#ff3b30', borderColor: '#00c853', borderColor0: '#ff3b30' }
            }],
            grid: { containLabel: true, left: '10%', right: '8%', top: 20, bottom: 20 },
            backgroundColor: 'transparent'
        });
        window.addEventListener('resize', () => chartInstance && chartInstance.resize());
        const latestPrice = getCurrentPrice(symbol);
        const changePct = getChangePercent(symbol);
        document.getElementById('currentPrice').innerText = `$${latestPrice.toFixed(2)}`;
        const changeSpan = document.getElementById('currentChange');
        changeSpan.innerText = `${changePct}%`;
        changeSpan.className = parseFloat(changePct) >= 0 ? 'positive' : 'negative';
        document.getElementById('tradeSymbol').innerHTML = `当前: ${symbol} $${latestPrice.toFixed(2)}`;
    }
    
    function addToWatchlist(symbol) {
        if (!currentUserWatchlist.includes(symbol)) {
            const newList = [...currentUserWatchlist, symbol];
            if (updateCurrentUserWatchlist(newList)) {
                currentUserWatchlist = newList;
                renderWatchlist();
                return true;
            }
        }
        return false;
    }
    
    function performSearch(query) {
        const upperQuery = query.toUpperCase();
        if (!query) return [];
        return Object.keys(stockDB).filter(sym => sym.toUpperCase().includes(upperQuery) || (stockDB[sym]?.name || '').toUpperCase().includes(upperQuery));
    }
    
    function renderSearchResults(results) {
        const container = document.getElementById('searchResults');
        if (!results.length) { container.classList.remove('show'); return; }
        container.innerHTML = results.map(sym => `<div class="search-result-item" data-symbol="${sym}"><div><span class="result-symbol">${sym}</span><span class="result-name"> ${stockDB[sym]?.name || ''}</span></div><div class="result-market">${stockDB[sym]?.market || ''}</div></div>`).join('');
        container.querySelectorAll('.search-result-item').forEach(el => {
            el.addEventListener('click', () => {
                const sym = el.getAttribute('data-symbol');
                currentActiveSymbol = sym;
                document.getElementById('currentSymbol').innerText = sym;
                renderChart(sym);
                renderWatchlist();
                document.getElementById('globalSearchInput').value = '';
                container.classList.remove('show');
            });
        });
        container.classList.add('show');
    }
    
    // 登录后初始化
    function initAfterLogin(username) {
        const fullUser = findUser(username);
        if (!fullUser) return;
        currentUserData = JSON.parse(JSON.stringify(fullUser));
        currentUserWatchlist = [...(fullUser.watchlist || ["AAPL", "TSLA"])];
        document.getElementById('displayUsername').innerText = username;
        document.getElementById('tradingApp').style.display = 'block';
        document.getElementById('authOverlay').style.display = 'none';
        currentActiveSymbol = currentUserWatchlist.length ? currentUserWatchlist[0] : "AAPL";
        document.getElementById('currentSymbol').innerText = currentActiveSymbol;
        renderChart(currentActiveSymbol);
        renderWatchlist();
        renderPortfolio();
        
        document.getElementById('addCurrentToWatchlist').onclick = () => addToWatchlist(currentActiveSymbol);
        document.getElementById('logoutBtn').onclick = () => logout();
        document.getElementById('buyBtn').onclick = () => {
            const qty = parseFloat(document.getElementById('tradeQuantity').value);
            const msg = executeTrade(currentActiveSymbol, 'buy', qty);
            document.getElementById('tradeMessage').innerText = msg;
            renderPortfolio();
            renderWatchlist(); // 刷新自选股价格
            renderChart(currentActiveSymbol); // 刷新图表价格显示
        };
        document.getElementById('sellBtn').onclick = () => {
            const qty = parseFloat(document.getElementById('tradeQuantity').value);
            const msg = executeTrade(currentActiveSymbol, 'sell', qty);
            document.getElementById('tradeMessage').innerText = msg;
            renderPortfolio();
            renderWatchlist();
            renderChart(currentActiveSymbol);
        };
        
        const searchInput = document.getElementById('globalSearchInput');
        const clearBtn = document.getElementById('clearSearchBtn');
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if (val === '') { document.getElementById('searchResults').classList.remove('show'); return; }
            renderSearchResults(performSearch(val).slice(0, 8));
        });
        clearBtn.addEventListener('click', () => { searchInput.value = ''; document.getElementById('searchResults').classList.remove('show'); });
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !document.getElementById('searchResults').contains(e.target)) {
                document.getElementById('searchResults').classList.remove('show');
            }
        });
    }
    
    function bindAuthEvents() {
        const loginTab = document.querySelector('[data-tab="login"]'), regTab = document.querySelector('[data-tab="register"]');
        const loginDiv = document.getElementById('loginForm'), regDiv = document.getElementById('registerForm');
        loginTab.addEventListener('click', () => { loginTab.classList.add('active'); regTab.classList.remove('active'); loginDiv.style.display = 'flex'; regDiv.style.display = 'none'; });
        regTab.addEventListener('click', () => { regTab.classList.add('active'); loginTab.classList.remove('active'); loginDiv.style.display = 'none'; regDiv.style.display = 'flex'; });
        document.getElementById('doLoginBtn').addEventListener('click', () => {
            const username = document.getElementById('loginUsername').value.trim(), pwd = document.getElementById('loginPassword').value;
            const res = loginUser(username, pwd);
            if (res.success) initAfterLogin(username);
            else document.getElementById('loginError').innerText = res.msg || "登录失败";
        });
        document.getElementById('doRegisterBtn').addEventListener('click', () => {
            const username = document.getElementById('regUsername').value.trim(), pwd = document.getElementById('regPassword').value;
            const regRes = registerUser(username, pwd);
            if (regRes.success) { alert("注册成功，请登录"); loginTab.click(); document.getElementById('loginUsername').value = username; document.getElementById('loginPassword').value = ''; document.getElementById('regError').innerText = ''; }
            else document.getElementById('regError').innerText = regRes.msg;
        });
    }
    
    initUserDatabase();
    bindAuthEvents();
    const savedUser = sessionStorage.getItem('currentUser');
    if (savedUser) {
        const parsed = JSON.parse(savedUser);
        if (findUser(parsed.username)) initAfterLogin(parsed.username);
        else { sessionStorage.removeItem('currentUser'); document.getElementById('authOverlay').style.display = 'flex'; }
    } else { document.getElementById('authOverlay').style.display = 'flex'; }
</script>
</body>
