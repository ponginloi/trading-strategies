<script>
// ==================== 配置 ====================
const FINNHUB_KEY = 'd8g3tj9r01qlgcuh34c0d8g3tj9r01qlgcuh34cg';
const GITHUB_TOKEN = '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';
const GITHUB_USER = 'ponginloi';
const GITHUB_REPO = 'trading-strategies';
const GITHUB_RAW = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;
const GITHUB_API = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents`;

// 动态股票信息库
let stockDB = {
    "AAPL": { name: "Apple Inc.", market: "US" },
    "TSLA": { name: "Tesla Inc.", market: "US" },
    "MSFT": { name: "Microsoft", market: "US" },
    "GOOGL": { name: "Alphabet", market: "US" },
    "AMZN": { name: "Amazon", market: "US" },
    "NVDA": { name: "NVIDIA", market: "US" },
    "META": { name: "Meta", market: "US" },
    "0700.HK": { name: "腾讯控股", market: "HK" },
    "9988.HK": { name: "阿里巴巴", market: "HK" },
    "03690.HK": { name: "美团", market: "HK" },
    "SH600519": { name: "贵州茅台", market: "CN" },
    "SZ000858": { name: "五粮液", market: "CN" },
    "SZ300750": { name: "宁德时代", market: "CN" },
    "600519": { name: "贵州茅台", market: "CN" },
    "000858": { name: "五粮液", market: "CN" }
};

// ==================== GitHub API 操作 ====================
function encodeToBase64(obj) {
    return btoa(unescape(encodeURIComponent(JSON.stringify(obj, null, 2))));
}

async function getFileSha(path) {
    try {
        const response = await fetch(`${GITHUB_API}/${path}`, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        if (response.status === 404) return null;
        const data = await response.json();
        return data.sha;
    } catch (e) {
        return null;
    }
}

async function saveToGitHub(path, content, message) {
    const existingSha = await getFileSha(path);
    const body = { message: message, content: encodeToBase64(content), branch: 'main' };
    if (existingSha) body.sha = existingSha;
    
    const response = await fetch(`${GITHUB_API}/${path}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    return response.ok;
}

async function readFromGitHub(path) {
    try {
        const response = await fetch(`${GITHUB_RAW}/${path}`);
        if (response.status === 404) return null;
        return await response.json();
    } catch(e) {
        return null;
    }
}

async function getAllUsersFromGitHub() {
    try {
        const response = await fetch(`${GITHUB_API}/users`, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        if (!response.ok) return [];
        const data = await response.json();
        if (!Array.isArray(data)) return [];
        
        const users = [];
        for (const item of data) {
            if (item.name && item.name.endsWith('.json')) {
                const username = item.name.replace('.json', '');
                const userData = await readFromGitHub(`users/${username}.json`);
                if (userData) users.push(userData);
            }
        }
        return users;
    } catch(e) {
        console.error('获取用户列表失败:', e);
        return [];
    }
}

// ==================== 用户操作 (GitHub 存储) ====================
async function registerUser(username, password) {
    if (username.length < 3) return { success: false, msg: "用户名至少3字符" };
    if (password.length < 4) return { success: false, msg: "密码至少4位" };
    
    const existing = await readFromGitHub(`users/${username}.json`);
    if (existing) return { success: false, msg: "用户名已存在" };
    
    const newUser = {
        username: username,
        password: password,
        watchlist: ["AAPL", "0700.HK", "SH600519"],
        cash: 100000,
        positions: {},
        tradeHistory: [],
        createdAt: new Date().toISOString()
    };
    
    const saved = await saveToGitHub(`users/${username}.json`, newUser, `创建用户 ${username}`);
    if (saved) return { success: true };
    return { success: false, msg: "保存失败，请检查网络" };
}

async function loginUser(username, password) {
    const userData = await readFromGitHub(`users/${username}.json`);
    if (!userData) return { success: false, msg: "用户名不存在" };
    if (userData.password !== password) return { success: false, msg: "密码错误" };
    
    sessionStorage.setItem('currentUser', JSON.stringify({
        username: userData.username,
        watchlist: userData.watchlist,
        cash: userData.cash,
        positions: userData.positions
    }));
    return { success: true };
}

async function syncUserToGitHub(userData) {
    const saved = await saveToGitHub(`users/${userData.username}.json`, userData, `更新用户 ${userData.username}`);
    if (saved) {
        sessionStorage.setItem('currentUser', JSON.stringify({
            username: userData.username,
            watchlist: userData.watchlist,
            cash: userData.cash,
            positions: userData.positions
        }));
        return true;
    }
    return false;
}

async function getCurrentUser() {
    const sessionData = sessionStorage.getItem('currentUser');
    if (!sessionData) return null;
    const parsed = JSON.parse(sessionData);
    return await readFromGitHub(`users/${parsed.username}.json`);
}

// ==================== 判断市场 ====================
function detectMarket(symbol) {
    if (symbol.includes('.HK')) return 'HK';
    if (symbol.startsWith('SH') || symbol.startsWith('SZ')) return 'CN';
    if (symbol.match(/^[0-9]{6}$/)) return symbol.startsWith('60') ? 'CN' : 'CN';
    return 'US';
}

// ==================== Finnhub 实时数据 ====================
async function getRealTimeQuote(symbol) {
    let finnhubSymbol = symbol;
    if (symbol.match(/^[0-9]{6}$/)) {
        finnhubSymbol = symbol.startsWith('60') ? `SH${symbol}` : `SZ${symbol}`;
    }
    
    try {
        const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${finnhubSymbol}&token=${FINNHUB_KEY}`);
        const data = await response.json();
        if (data.c) {
            return {
                price: data.c,
                change: data.d,
                changePercent: data.dp,
                high: data.h,
                low: data.l,
                open: data.o,
                prevClose: data.pc
            };
        }
        return null;
    } catch (error) {
        return null;
    }
}

async function getHistoricalKline(symbol, days = 50) {
    let finnhubSymbol = symbol;
    if (symbol.match(/^[0-9]{6}$/)) {
        finnhubSymbol = symbol.startsWith('60') ? `SH${symbol}` : `SZ${symbol}`;
    }
    
    const end = Math.floor(Date.now() / 1000);
    const start = end - days * 24 * 60 * 60;
    
    try {
        const response = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${finnhubSymbol}&resolution=D&from=${start}&to=${end}&token=${FINNHUB_KEY}`);
        const data = await response.json();
        if (data.s === 'ok' && data.t && data.t.length > 0) {
            return data.t.map((t, i) => {
                const date = new Date(t * 1000);
                return [`${date.getMonth()+1}/${date.getDate()}`, data.o[i], data.c[i], data.l[i], data.h[i]];
            });
        }
        return [];
    } catch (error) {
        return [];
    }
}

// ==================== WebSocket 实时推送 (美股) ====================
let ws = null;
let realTimeSubscriptions = new Set();
let klineCache = {};
let quoteCache = {};
let chartInstance = null;
let currentActiveSymbol = "AAPL";
let currentUserData = null;
let autoRefreshInterval = null;

function connectWebSocket() {
    if (ws && ws.readyState === WebSocket.OPEN) return;
    
    ws = new WebSocket(`wss://ws.finnhub.io?token=${FINNHUB_KEY}`);
    
    ws.onopen = () => {
        console.log('✅ 实时行情 WebSocket 已连接');
        realTimeSubscriptions.forEach(symbol => {
            ws.send(JSON.stringify({ type: 'subscribe', symbol }));
        });
    };
    
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'trade' && data.data) {
            const trade = data.data[0];
            const symbol = trade.s;
            const price = trade.p;
            const timestamp = trade.t;
            
            if (quoteCache[symbol]) {
                const oldPrice = quoteCache[symbol].price;
                quoteCache[symbol].price = price;
                quoteCache[symbol].change = price - (quoteCache[symbol].prevClose || price);
                quoteCache[symbol].changePercent = ((price - (quoteCache[symbol].prevClose || price)) / (quoteCache[symbol].prevClose || price) * 100).toFixed(2);
                quoteCache[symbol].lastUpdate = timestamp;
            } else {
                quoteCache[symbol] = { price: price, change: 0, changePercent: 0, lastUpdate: timestamp };
            }
            
            // 更新UI
            if (symbol === currentActiveSymbol) {
                updateDisplay();
            }
            renderWatchlist();
            renderPortfolio();
        }
    };
    
    ws.onerror = (error) => console.error('WebSocket 错误:', error);
    ws.onclose = () => {
        console.log('WebSocket 断开，3秒后重连');
        setTimeout(connectWebSocket, 3000);
    };
}

function subscribeRealTime(symbol) {
    if (detectMarket(symbol) !== 'US') return;
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'subscribe', symbol }));
    }
    realTimeSubscriptions.add(symbol);
}

function unsubscribeRealTime(symbol) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'unsubscribe', symbol }));
    }
    realTimeSubscriptions.delete(symbol);
}

// ==================== 数据获取（带缓存） ====================
async function getKline(symbol) {
    if (!klineCache[symbol]) {
        klineCache[symbol] = await getHistoricalKline(symbol, 50);
    }
    return klineCache[symbol];
}

async function getCurrentPrice(symbol) {
    if (quoteCache[symbol] && Date.now() - (quoteCache[symbol].lastUpdate || 0) < 5000) {
        return quoteCache[symbol].price;
    }
    const quote = await getRealTimeQuote(symbol);
    if (quote) {
        quoteCache[symbol] = { ...quote, lastUpdate: Date.now() };
        return quote.price;
    }
    return quoteCache[symbol]?.price || 100;
}

async function getChangePercent(symbol) {
    const quote = await getRealTimeQuote(symbol);
    if (quote) return quote.changePercent.toFixed(2);
    return quoteCache[symbol]?.changePercent?.toFixed(2) || "0.00";
}

// ==================== 辅助函数 ====================
function calculateTotalAsset(userData) {
    if (!userData) return 0;
    let positionsValue = 0;
    for (const [sym, pos] of Object.entries(userData.positions || {})) {
        const price = quoteCache[sym]?.price || 100;
        positionsValue += pos.quantity * price;
    }
    return (userData.cash || 0) + positionsValue;
}

// ==================== UI 渲染 ====================
async function renderPortfolio() {
    if (!currentUserData) return;
    
    for (const sym of Object.keys(currentUserData.positions || {})) {
        await getCurrentPrice(sym);
    }
    
    const container = document.getElementById('positionsContainer');
    const positions = currentUserData.positions || {};
    
    if (Object.keys(positions).length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#aaa;padding:12px;">暂无持仓，请买入股票</div>';
    } else {
        let html = '';
        for (const [sym, pos] of Object.entries(positions)) {
            const price = quoteCache[sym]?.price || 100;
            const profit = (price - pos.avgCost) * pos.quantity;
            html += `<div class="position-item">
                        <div><strong>${sym}</strong><br>${pos.quantity}股</div>
                        <div style="text-align:right;">
                            $${price.toFixed(2)}<br>
                            <span class="${profit>=0?'positive':'negative'}">${profit>=0?'+':''}$${profit.toFixed(2)}</span>
                        </div>
                     </div>`;
        }
        container.innerHTML = html;
    }
    
    const totalAsset = calculateTotalAsset(currentUserData);
    document.getElementById('totalAsset').innerHTML = `$${totalAsset.toFixed(2)}`;
    document.getElementById('availableCash').innerHTML = `$${currentUserData.cash.toFixed(2)}`;
    
    let totalCost = 0, totalValue = 0;
    for (const [sym, pos] of Object.entries(currentUserData.positions || {})) {
        const price = quoteCache[sym]?.price || 100;
        totalCost += pos.quantity * pos.avgCost;
        totalValue += pos.quantity * price;
    }
    const totalProfit = totalValue - totalCost;
    document.getElementById('totalProfit').innerHTML = `${totalProfit>=0?'+':''}$${totalProfit.toFixed(2)}`;
    document.getElementById('totalProfit').className = totalProfit >= 0 ? 'positive' : 'negative';
    
    let bestStock = '-', bestProfit = -Infinity;
    for (const [sym, pos] of Object.entries(currentUserData.positions || {})) {
        const price = quoteCache[sym]?.price || 100;
        const profit = pos.quantity * (price - pos.avgCost);
        if (profit > bestProfit) { bestProfit = profit; bestStock = sym; }
    }
    document.getElementById('bestStock').innerHTML = bestProfit > 0 ? bestStock : '-';
    
    let todayProfit = 0;
    for (const [sym, pos] of Object.entries(currentUserData.positions || {})) {
        const change = parseFloat(await getChangePercent(sym));
        const price = quoteCache[sym]?.price || 100;
        todayProfit += pos.quantity * price * (change / 100);
    }
    document.getElementById('todayProfit').innerHTML = `${todayProfit>=0?'+':''}$${todayProfit.toFixed(2)}`;
    document.getElementById('todayProfit').className = todayProfit >= 0 ? 'positive' : 'negative';
}

function renderWatchlist() {
    const container = document.getElementById('watchlistContainer');
    if (!currentUserData?.watchlist?.length) {
        container.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;">暂无自选，去搜索添加</div>';
        return;
    }
    container.innerHTML = '';
    currentUserData.watchlist.forEach(sym => {
        const price = quoteCache[sym]?.price || 100;
        const change = quoteCache[sym]?.changePercent || 0;
        const div = document.createElement('div');
        div.className = `watchlist-item ${currentActiveSymbol === sym ? 'active' : ''}`;
        div.innerHTML = `
            <div><div class="watchlist-symbol">${sym}</div><div style="font-size:0.7rem;color:#aaa;">${stockDB[sym]?.name || sym}</div></div>
            <div style="text-align:right;">
                <div class="watchlist-price">$${price.toFixed(2)}</div>
                <div class="${change>=0?'positive':'negative'}">${change>=0?'+':''}${change.toFixed(2)}%</div>
            </div>
            <button class="remove-stock" data-symbol="${sym}">✕</button>
        `;
        div.addEventListener('click', (e) => { if (!e.target.classList.contains('remove-stock')) { currentActiveSymbol = sym; renderWatchlist(); renderChart(sym); updateDisplay(); } });
        const removeBtn = div.querySelector('.remove-stock');
        removeBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            currentUserData.watchlist = currentUserData.watchlist.filter(s => s !== sym);
            await syncUserToGitHub(currentUserData);
            unsubscribeRealTime(sym);
            if (currentActiveSymbol === sym && currentUserData.watchlist.length) {
                currentActiveSymbol = currentUserData.watchlist[0];
            }
            renderWatchlist();
            if (currentActiveSymbol) { renderChart(currentActiveSymbol); updateDisplay(); subscribeRealTime(currentActiveSymbol); }
            await renderRanking();
        });
        container.appendChild(div);
    });
}

async function renderChart(symbol) {
    const chartDom = document.getElementById('klineChart');
    if (chartInstance) chartInstance.dispose();
    
    chartDom.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;">加载K线数据中...</div>';
    
    const klineData = await getKline(symbol);
    
    if (!klineData || klineData.length === 0) {
        chartDom.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#ff3b30;">无法获取K线数据，请稍后重试</div>';
        return;
    }
    
    chartInstance = echarts.init(chartDom);
    chartInstance.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        xAxis: { type: 'category', data: klineData.map(v => v[0]), axisLabel: { rotate: 30, color: '#aaa' } },
        yAxis: { scale: true, axisLabel: { color: '#ddd' }, splitLine: { lineStyle: { color: '#333' } } },
        series: [{
            type: 'candlestick',
            data: klineData.map(v => [v[1], v[2], v[3], v[4]]),
            itemStyle: { color: '#00c853', color0: '#ff3b30', borderColor: '#00c853', borderColor0: '#ff3b30' }
        }],
        backgroundColor: 'transparent',
        grid: { containLabel: true, left: '10%', right: '8%', top: 20, bottom: 20 }
    });
}

async function updateDisplay() {
    document.getElementById('currentSymbol').innerText = currentActiveSymbol;
    const price = await getCurrentPrice(currentActiveSymbol);
    const change = await getChangePercent(currentActiveSymbol);
    document.getElementById('currentPrice').innerHTML = `$${price.toFixed(2)}`;
    document.getElementById('currentChange').innerHTML = `${parseFloat(change)>=0?'+':''}${change}%`;
    document.getElementById('currentChange').className = parseFloat(change) >= 0 ? 'positive' : 'negative';
    document.getElementById('tradeSymbol').innerHTML = `当前: ${currentActiveSymbol} $${price.toFixed(2)}`;
}

async function renderRanking() {
    const container = document.getElementById('rankContainer');
    container.innerHTML = '<div class="loading-spinner">加载排行榜...</div>';
    
    const users = await getAllUsersFromGitHub();
    const currentName = currentUserData?.username;
    
    const rankings = [];
    for (const user of users) {
        let total = user.cash;
        for (const [sym, pos] of Object.entries(user.positions || {})) {
            const price = quoteCache[sym]?.price || 100;
            total += pos.quantity * price;
        }
        rankings.push({ username: user.username, asset: total });
    }
    rankings.sort((a, b) => b.asset - a.asset);
    
    if (rankings.length === 0) {
        container.innerHTML = '<div style="padding:16px;text-align:center;color:#aaa;">暂无其他用户</div>';
        return;
    }
    
    let html = '';
    rankings.slice(0, 10).forEach((user, idx) => {
        const isCurrent = user.username === currentName;
        html += `<div class="${isCurrent ? 'rank-current' : 'rank-item'}">
                    <span>${idx + 1}</span>
                    <span>${user.username}${isCurrent ? ' (你)' : ''}</span>
                    <span>$${user.asset.toFixed(2)}</span>
                 </div>`;
    });
    container.innerHTML = html;
}

async function executeTrade(symbol, type, quantity) {
    if (!currentUserData) return "请先登录";
    const price = await getCurrentPrice(symbol);
    if (quantity <= 0) return "数量必须大于0";
    
    if (type === 'buy') {
        const cost = price * quantity;
        if (currentUserData.cash < cost) return `资金不足，需要 $${cost.toFixed(2)}`;
        currentUserData.cash -= cost;
        if (!currentUserData.positions[symbol]) {
            currentUserData.positions[symbol] = { quantity: 0, avgCost: 0 };
        }
        const pos = currentUserData.positions[symbol];
        const newQty = pos.quantity + quantity;
        pos.avgCost = (pos.quantity * pos.avgCost + cost) / newQty;
        pos.quantity = newQty;
    } else if (type === 'sell') {
        const pos = currentUserData.positions[symbol];
        if (!pos || pos.quantity < quantity) return `持仓不足，只有 ${pos?.quantity || 0} 股`;
        currentUserData.cash += price * quantity;
        pos.quantity -= quantity;
        if (pos.quantity === 0) delete currentUserData.positions[symbol];
    } else {
        return "无效操作";
    }
    
    const saved = await syncUserToGitHub(currentUserData);
    if (!saved) return "保存到 GitHub 失败，请检查网络";
    
    await renderPortfolio();
    await renderRanking();
    return `✅ 成功${type === 'buy' ? '买入' : '卖出'} ${quantity} 股 ${symbol} @ $${price.toFixed(2)}`;
}

async function addToWatchlist(symbol) {
    if (!currentUserData.watchlist.includes(symbol)) {
        currentUserData.watchlist.push(symbol);
        await syncUserToGitHub(currentUserData);
        subscribeRealTime(symbol);
        renderWatchlist();
        return true;
    }
    return false;
}

function performSearch(query) {
    const upper = query.toUpperCase();
    return Object.keys(stockDB).filter(s => s.toUpperCase().includes(upper) || (stockDB[s]?.name || '').toUpperCase().includes(upper));
}

function renderSearchResults(results) {
    const container = document.getElementById('searchResults');
    if (!results.length) { container.classList.remove('show'); return; }
    container.innerHTML = results.map(sym => `<div class="search-result-item" data-symbol="${sym}"><span>${sym}</span><span style="font-size:0.7rem;">${stockDB[sym]?.name || sym}</span></div>`).join('');
    container.querySelectorAll('.search-result-item').forEach(el => {
        el.addEventListener('click', async () => {
            const sym = el.getAttribute('data-symbol');
            currentActiveSymbol = sym;
            await renderChart(sym);
            await updateDisplay();
            renderWatchlist();
            subscribeRealTime(sym);
            document.getElementById('globalSearchInput').value = '';
            container.classList.remove('show');
        });
    });
    container.classList.add('show');
}

// 定时刷新（非美股）
function startAutoRefresh() {
    if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(async () => {
        if (currentUserData && currentActiveSymbol && detectMarket(currentActiveSymbol) !== 'US') {
            const quote = await getRealTimeQuote(currentActiveSymbol);
            if (quote) {
                quoteCache[currentActiveSymbol] = { ...quote, lastUpdate: Date.now() };
                updateDisplay();
                renderWatchlist();
                renderPortfolio();
            }
        }
    }, 60000);
}

async function initAfterLogin(username) {
    currentUserData = await getCurrentUser();
    if (!currentUserData) return;
    
    document.getElementById('displayUsername').innerHTML = `${username} ☁️`;
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('tradingApp').style.display = 'block';
    
    // 预加载价格
    for (const sym of currentUserData.watchlist || []) {
        await getCurrentPrice(sym);
        subscribeRealTime(sym);
    }
    
    currentActiveSymbol = currentUserData.watchlist?.[0] || "AAPL";
    await renderChart(currentActiveSymbol);
    await updateDisplay();
    renderWatchlist();
    await renderPortfolio();
    await renderRanking();
    
    subscribeRealTime(currentActiveSymbol);
    startAutoRefresh();
    connectWebSocket();
    
    document.getElementById('addCurrentToWatchlist').onclick = () => addToWatchlist(currentActiveSymbol);
    document.getElementById('refreshRankBtn').onclick = () => renderRanking();
    document.getElementById('logoutBtn').onclick = () => {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        if (ws) ws.close();
        sessionStorage.removeItem('currentUser');
        document.getElementById('authOverlay').style.display = 'flex';
        document.getElementById('tradingApp').style.display = 'none';
    };
    document.getElementById('buyBtn').onclick = async () => {
        const qty = parseFloat(document.getElementById('tradeQuantity').value);
        const msg = await executeTrade(currentActiveSymbol, 'buy', qty);
        document.getElementById('tradeMessage').innerText = msg;
        setTimeout(() => document.getElementById('tradeMessage').innerText = '', 3000);
        renderWatchlist();
        await updateDisplay();
    };
    document.getElementById('sellBtn').onclick = async () => {
        const qty = parseFloat(document.getElementById('tradeQuantity').value);
        const msg = await executeTrade(currentActiveSymbol, 'sell', qty);
        document.getElementById('tradeMessage').innerText = msg;
        setTimeout(() => document.getElementById('tradeMessage').innerText = '', 3000);
        renderWatchlist();
        await updateDisplay();
    };
    
    const searchInput = document.getElementById('globalSearchInput');
    searchInput.addEventListener('input', (e) => {
        const val = e.target.value.trim();
        if (!val) { document.getElementById('searchResults').classList.remove('show'); return; }
        renderSearchResults(performSearch(val).slice(0, 6));
    });
    document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target)) document.getElementById('searchResults').classList.remove('show');
    });
}

// ==================== 启动 ====================
function bindAuthEvents() {
    const loginTab = document.querySelector('[data-tab="login"]'), regTab = document.querySelector('[data-tab="register"]');
    const loginDiv = document.getElementById('loginForm'), regDiv = document.getElementById('registerForm');
    loginTab.onclick = () => { loginTab.classList.add('active'); regTab.classList.remove('active'); loginDiv.style.display = 'flex'; regDiv.style.display = 'none'; };
    regTab.onclick = () => { regTab.classList.add('active'); loginTab.classList.remove('active'); loginDiv.style.display = 'none'; regDiv.style.display = 'flex'; };
    
    document.getElementById('doLoginBtn').onclick = async () => {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const res = await loginUser(username, password);
        if (res.success) await initAfterLogin(username);
        else document.getElementById('loginError').innerText = res.msg;
    };
    
    document.getElementById('doRegisterBtn').onclick = async () => {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const res = await registerUser(username, password);
        if (res.success) {
            alert("✅ 注册成功！请登录");
            loginTab.click();
            document.getElementById('loginUsername').value = username;
            document.getElementById('loginPassword').value = '';
            document.getElementById('regError').innerText = '';
        } else {
            document.getElementById('regError').innerText = res.msg;
        }
    };
}

bindAuthEvents();

(async () => {
    const saved = sessionStorage.getItem('currentUser');
    if (saved) {
        const parsed = JSON.parse(saved);
        const user = await readFromGitHub(`users/${parsed.username}.json`);
        if (user) await initAfterLogin(parsed.username);
    }
})();
</script>
