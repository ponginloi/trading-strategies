<body>

                    <button id="syncDataBtn" class="submit-btn" style="background: #4f46e5; margin-top: 8px;">💾 Sync Data to Cloud</button>

    <script>
        const FINNHUB_API_KEY = 'd8g3tj9r01qlgcuh34c0d8g3tj9r01qlgcuh34cg';
        const DEEPSEEK_API_KEY = "sk-1f33b84b5ed746d09628b7834fc32170";
        
        let currentUser = null;
        let users = {};
        let portfolioData = {};
        let watchlist = [];
        let selectedStock = null;
        let currentOrderType = 'buy';
        let klineChart = null;
        let refreshInterval = null;
        let currentTimeframe = '1M';
        let stocksData = {};

        // 价格数据库
        const realPriceData = {
            'AAPL': 175.34, 'MSFT': 420.72, 'GOOGL': 138.45, 'AMZN': 145.89, 'TSLA': 240.12, 'NVDA': 950.67,
            'META': 485.23, 'JPM': 192.45, 'NFLX': 620.34, 'ADBE': 560.78, 'AMD': 165.34, 'INTC': 42.56
        };

        const stockDatabase = [
            { symbol: 'AAPL', name: 'Apple Inc.', market: 'US' }, { symbol: 'MSFT', name: 'Microsoft', market: 'US' },
            { symbol: 'GOOGL', name: 'Google', market: 'US' }, { symbol: 'AMZN', name: 'Amazon', market: 'US' },
            { symbol: 'TSLA', name: 'Tesla', market: 'US' }, { symbol: 'NVDA', name: 'NVIDIA', market: 'US' },
            { symbol: 'META', name: 'Meta', market: 'US' }, { symbol: 'JPM', name: 'JPMorgan', market: 'US' }
        ];

        // ============ GitHub 数据存储 ============
        async function saveAllDataToGitHub() {
            const repo = document.getElementById('githubRepo').value.trim();
            const token = document.getElementById('githubToken').value.trim();
            const status = document.getElementById('cloudStatus');
            
            if (!repo || !token) {
                status.innerHTML = '⚠️ Set repo & token';
                setTimeout(() => status.innerHTML = '● Online', 3000);
                return;
            }
            
            const allData = {
                users: users,
                portfolios: portfolioData,
                watchlists: { [currentUser?.id]: watchlist },
                lastUpdated: new Date().toISOString(),
                version: '1.0'
            };
            
            const content = JSON.stringify(allData, null, 2);
            const encoded = btoa(unescape(encodeURIComponent(content)));
            const filename = `tradewise_data_${currentUser?.username}.json`;
            
            status.innerHTML = '⏳ Syncing...';
            
            try {
                // 检查文件是否存在
                let check = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                let sha = null;
                if (check.ok) { const exist = await check.json(); sha = exist.sha; }
                
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `TradeWise data sync - ${currentUser?.username} - ${new Date().toLocaleString()}`,
                        content: encoded,
                        sha: sha
                    })
                });
                
                if (res.ok) {
                    status.innerHTML = '✅ Synced!';
                    setTimeout(() => status.innerHTML = '● Online', 3000);
                    showToast('Data saved to GitHub!');
                } else {
                    status.innerHTML = '❌ Failed';
                    setTimeout(() => status.innerHTML = '● Online', 3000);
                }
            } catch(e) {
                status.innerHTML = '❌ Error';
                setTimeout(() => status.innerHTML = '● Online', 3000);
            }
        }
        
        async function loadDataFromGitHub() {
            const repo = document.getElementById('githubRepo').value.trim();
            const token = document.getElementById('githubToken').value.trim();
            const status = document.getElementById('cloudStatus');
            
            if (!repo || !token) {
                status.innerHTML = '⚠️ Set repo & token';
                setTimeout(() => status.innerHTML = '● Online', 3000);
                return;
            }
            
            const filename = `tradewise_data_${currentUser?.username}.json`;
            status.innerHTML = '⏳ Loading...';
            
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    const content = decodeURIComponent(escape(atob(data.content)));
                    const savedData = JSON.parse(content);
                    
                    // 恢复数据
                    users = savedData.users || users;
                    portfolioData = savedData.portfolios || portfolioData;
                    if (savedData.watchlists && savedData.watchlists[currentUser?.id]) {
                        watchlist = savedData.watchlists[currentUser?.id];
                        localStorage.setItem('user_watchlist', JSON.stringify(watchlist));
                    }
                    
                    // 保存到本地存储
                    localStorage.setItem('trading_users', JSON.stringify(users));
                    localStorage.setItem('trading_portfolios', JSON.stringify(portfolioData));
                    
                    // 刷新界面
                    if (currentUser) {
                        const portfolio = portfolioData[currentUser.id] || { balance: 100000, holdings: {} };
                        document.getElementById('balance').textContent = `$${portfolio.balance.toFixed(2)}`;
                        renderWatchlist();
                        updatePortfolio();
                        updateGlobalRanking();
                    }
                    
                    status.innerHTML = '✅ Loaded!';
                    setTimeout(() => status.innerHTML = '● Online', 3000);
                    showToast('Data loaded from GitHub!');
                } else {
                    status.innerHTML = '⚠️ No saved data';
                    setTimeout(() => status.innerHTML = '● Online', 3000);
                }
            } catch(e) {
                status.innerHTML = '❌ Error';
                setTimeout(() => status.innerHTML = '● Online', 3000);
            }
        }
        
        // ============ 排行榜功能 ============
        function calculateTotalValue(userId) {
            const portfolio = portfolioData[userId] || { balance: 100000, holdings: {} };
            let total = portfolio.balance;
            for (const [symbol, holding] of Object.entries(portfolio.holdings || {})) {
                const currentPrice = stocksData[symbol]?.price || realPriceData[symbol] || 150;
                total += holding.shares * currentPrice;
            }
            return total;
        }
        
        function updateGlobalRanking() {
            const rankings = [];
            for (const [userId, user] of Object.entries(users)) {
                const totalValue = calculateTotalValue(userId);
                rankings.push({
                    id: userId,
                    username: user.username,
                    totalValue: totalValue
                });
            }
            
            rankings.sort((a, b) => b.totalValue - a.totalValue);
            
            const container = document.getElementById('rankingList');
            if (!container) return;
            
            if (rankings.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:rgba(255,255,255,0.5);">No users yet</div>';
                return;
            }
            
            container.innerHTML = rankings.slice(0, 10).map((user, idx) => `
                <div class="ranking-item ${idx === 0 ? 'ranking-top1' : ''}" style="${idx === 0 ? 'background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,165,0,0.1)); border-radius: 8px; padding: 8px; margin-bottom: 4px;' : ''}">
                    <div class="ranking-rank">${idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx+1}`}</div>
                    <div class="ranking-name">${user.username} ${currentUser?.username === user.username ? '(you)' : ''}</div>
                    <div class="ranking-value">$${user.totalValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                </div>
            `).join('');
        }

        // ============ 股票数据功能 ============
        async function getQuote(symbol) {
            try {
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_API_KEY}`);
                const data = await response.json();
                if (data && data.c && data.c > 0) {
                    return { price: data.c, change: data.d, changePercent: data.dp };
                }
            } catch (error) {}
            const basePrice = realPriceData[symbol] || 150;
            const changePercent = (Math.random() - 0.5) * 2;
            return { price: basePrice * (1 + changePercent/100), changePercent: changePercent };
        }
        
        function generateMockCandles(symbol, days = 30) {
            const candles = [];
            const basePrice = realPriceData[symbol] || 150;
            let currentPrice = basePrice;
            for (let i = 0; i < days; i++) {
                const change = (Math.random() - 0.5) * 0.02 * currentPrice;
                const open = currentPrice;
                const close = currentPrice + change;
                candles.push({ time: i, open, high: Math.max(open, close) * 1.01, low: Math.min(open, close) * 0.99, close, volume: Math.random() * 20000000 });
                currentPrice = close;
            }
            return candles;
        }
        
        async function getRealCandles(symbol, timeframe) {
            const days = timeframe === '1D' ? 24 : timeframe === '1W' ? 30 : timeframe === '1M' ? 30 : timeframe === '3M' ? 90 : 52;
            return generateMockCandles(symbol, days);
        }
        
        async function refreshAllQuotes() {
            for (const stock of watchlist) {
                const quote = await getQuote(stock.symbol);
                if (quote) { stock.price = quote.price; stock.changePercent = quote.changePercent; stocksData[stock.symbol] = stock; }
            }
            if (selectedStock) {
                const quote = await getQuote(selectedStock.symbol);
                if (quote) { selectedStock.price = quote.price; selectedStock.changePercent = quote.changePercent; }
                updateSelectedDisplay();
            }
            renderWatchlist();
            updatePortfolio();
            updateGlobalRanking();
            if (selectedStock) document.getElementById('marketPrice').value = `$${selectedStock.price?.toFixed(2) || '0.00'}`;
            updatePreview();
        }
        
        async function renderKline() {
            if (!selectedStock) return;
            const chartDom = document.getElementById('klineChart');
            if (!chartDom) return;
            const candles = await getRealCandles(selectedStock.symbol, currentTimeframe);
            if (klineChart) klineChart.dispose();
            klineChart = echarts.init(chartDom);
            const values = candles.map(c => [c.open, c.close, c.low, c.high]);
            klineChart.setOption({
                title: { text: `${selectedStock.symbol} - Candlestick`, textStyle: { color: '#fff' } },
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(20,24,49,0.95)', textStyle: { color: '#fff' }, formatter: (params) => { const v = params[0].value; return `Open: $${v[0].toFixed(2)}<br>High: $${v[2].toFixed(2)}<br>Low: $${v[3].toFixed(2)}<br>Close: $${v[1].toFixed(2)}`; } },
                xAxis: { type: 'category', data: candles.map((_, i) => i+1), axisLabel: { color: '#fff' } },
                yAxis: { scale: true, axisLabel: { color: '#fff' } },
                series: [{ type: 'candlestick', data: values, itemStyle: { color: '#00c853', color0: '#ff3b30' } }],
                backgroundColor: 'transparent'
            });
        }
        
        function updateSelectedDisplay() {
            if (!selectedStock) return;
            document.querySelector('.selected-symbol').textContent = selectedStock.symbol;
            document.getElementById('currentPrice').textContent = `$${selectedStock.price?.toFixed(2) || '0.00'}`;
            const change = document.getElementById('currentChange');
            const pct = selectedStock.changePercent || 0;
            change.textContent = `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
            change.className = `selected-change ${pct >= 0 ? 'positive' : 'negative'}`;
        }
        
        function renderWatchlist() {
            const container = document.getElementById('watchlistContainer');
            container.innerHTML = watchlist.map(stock => `
                <div class="watchlist-item ${selectedStock?.symbol === stock.symbol ? 'active' : ''}" onclick="selectStock('${stock.symbol}')">
                    <div class="watchlist-item-info"><div class="watchlist-symbol">${stock.symbol}</div><div class="watchlist-name">${stock.name}</div></div>
                    <div class="watchlist-quote"><div class="watchlist-price">$${stock.price?.toFixed(2) || '0.00'}</div>
                    <div class="watchlist-change ${stock.changePercent >= 0 ? 'positive' : 'negative'}">${stock.changePercent >= 0 ? '+' : ''}${stock.changePercent?.toFixed(2) || '0'}%</div></div>
                    <button class="remove-stock" onclick="removeStock('${stock.symbol}', event)">✕</button>
                </div>
            `).join('');
        }
        
        window.selectStock = async (symbol) => {
            const stock = watchlist.find(s => s.symbol === symbol);
            if (stock) {
                const quote = await getQuote(symbol);
                selectedStock = { ...stock, price: quote?.price || 150, changePercent: quote?.changePercent || 0 };
                updateSelectedDisplay();
                renderWatchlist();
                await renderKline();
                document.getElementById('marketPrice').value = `$${selectedStock.price?.toFixed(2)}`;
                updatePreview();
            }
        };
        
        window.removeStock = (symbol, event) => {
            event.stopPropagation();
            watchlist = watchlist.filter(s => s.symbol !== symbol);
            localStorage.setItem('user_watchlist', JSON.stringify(watchlist));
            if (selectedStock?.symbol === symbol && watchlist.length > 0) selectStock(watchlist[0].symbol);
            renderWatchlist();
        };
        
        function addCurrentToWatchlist() {
            if (!selectedStock) return;
            if (!watchlist.find(s => s.symbol === selectedStock.symbol)) {
                watchlist.push({ symbol: selectedStock.symbol, name: selectedStock.name });
                localStorage.setItem('user_watchlist', JSON.stringify(watchlist));
                renderWatchlist();
                showToast(`Added ${selectedStock.symbol} to watchlist`);
            }
        }
        
        function searchStocks(query) {
            if (!query || query.length < 1) { document.getElementById('searchResults').classList.remove('show'); return; }
            const results = stockDatabase.filter(s => s.symbol.toLowerCase().includes(query.toLowerCase()) || s.name.toLowerCase().includes(query.toLowerCase())).slice(0, 10);
            const container = document.getElementById('searchResults');
            if (results.length === 0) { container.classList.remove('show'); return; }
            container.innerHTML = results.map(s => `<div class="search-result-item" onclick="addStockFromSearch('${s.symbol}', '${s.name}')"><div><div class="result-symbol">${s.symbol}</div><div class="result-name">${s.name}</div></div></div>`).join('');
            container.classList.add('show');
        }
        
        window.addStockFromSearch = async (symbol, name) => {
            if (!watchlist.find(s => s.symbol === symbol)) {
                watchlist.push({ symbol, name });
                localStorage.setItem('user_watchlist', JSON.stringify(watchlist));
                renderWatchlist();
            }
            const quote = await getQuote(symbol);
            selectedStock = { symbol, name, price: quote?.price || 150, changePercent: quote?.changePercent || 0 };
            updateSelectedDisplay();
            renderWatchlist();
            await renderKline();
            document.getElementById('marketPrice').value = `$${selectedStock.price?.toFixed(2)}`;
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').classList.remove('show');
            showToast(`Added ${symbol}`);
        };
        
        function updatePortfolio() {
            if (!currentUser) return;
            const portfolio = portfolioData[currentUser.id] || { balance: 100000, holdings: {} };
            document.getElementById('balance').textContent = `$${portfolio.balance.toFixed(2)}`;
            const container = document.getElementById('portfolioContainer');
            const holdings = Object.entries(portfolio.holdings || {});
            if (holdings.length === 0) { container.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.5);">No positions</div>'; return; }
            container.innerHTML = holdings.map(([symbol, holding]) => {
                const currentStock = watchlist.find(s => s.symbol === symbol);
                const currentPrice = currentStock?.price || holding.avgPrice;
                const pnl = (currentPrice - holding.avgPrice) * holding.shares;
                return `<div class="portfolio-item"><div class="portfolio-header"><span>${symbol}</span><span class="${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</span></div>
                        <div class="portfolio-details"><span>${holding.shares} shares</span><span>Avg: $${holding.avgPrice.toFixed(2)}</span><span>Now: $${currentPrice.toFixed(2)}</span></div></div>`;
            }).join('');
        }
        
        function updatePreview() {
            const shares = parseInt(document.getElementById('tradeShares').value) || 0;
            document.getElementById('estimatedTotal').textContent = `$${(shares * (selectedStock?.price || 0)).toFixed(2)}`;
        }
        
        async function executeTrade() {
            if (!currentUser || !selectedStock) return;
            const shares = parseInt(document.getElementById('tradeShares').value);
            if (shares <= 0) { showToast('Invalid quantity', true); return; }
            const price = selectedStock.price;
            const total = shares * price;
            const portfolio = portfolioData[currentUser.id] || { balance: 100000, holdings: {} };
            if (currentOrderType === 'buy') {
                if (portfolio.balance < total) { showToast('Insufficient balance', true); return; }
                portfolio.balance -= total;
                if (!portfolio.holdings[selectedStock.symbol]) portfolio.holdings[selectedStock.symbol] = { symbol: selectedStock.symbol, shares: 0, avgPrice: 0 };
                const h = portfolio.holdings[selectedStock.symbol];
                h.avgPrice = (h.avgPrice * h.shares + total) / (h.shares + shares);
                h.shares += shares;
                showToast(`✓ Bought ${shares} shares`);
            } else {
                const h = portfolio.holdings[selectedStock.symbol];
                if (!h || h.shares < shares) { showToast('Insufficient shares', true); return; }
                portfolio.balance += total;
                h.shares -= shares;
                if (h.shares === 0) delete portfolio.holdings[selectedStock.symbol];
                showToast(`✓ Sold ${shares} shares`);
            }
            portfolioData[currentUser.id] = portfolio;
            localStorage.setItem('trading_portfolios', JSON.stringify(portfolioData));
            updatePortfolio();
            updateGlobalRanking();
        }
        
        async function askAI(question) {
            if (!question.trim() || !selectedStock) return;
            const div = document.getElementById('aiQuickAnswer');
            div.innerHTML = '🤔 Thinking...';
            try {
                const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
                    body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'system', content: `Stock: ${selectedStock.symbol} at $${selectedStock.price}` }, { role: 'user', content: question }], max_tokens: 200 })
                });
                const data = await res.json();
                div.innerHTML = data.choices[0].message.content;
            } catch(e) { div.innerHTML = '⚠️ AI unavailable'; }
        }
        
        function showToast(msg, isErr = false) {
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
            t.style.background = isErr ? 'rgba(255,59,48,0.9)' : 'rgba(0,200,83,0.9)';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        function initAuth() {
            const savedUsers = localStorage.getItem('trading_users');
            if (savedUsers) users = JSON.parse(savedUsers);
            const savedPortfolios = localStorage.getItem('trading_portfolios');
            if (savedPortfolios) portfolioData = JSON.parse(savedPortfolios);
            
            if (!users['demo']) { users['demo'] = { id: 'demo_001', username: 'demo', password: 'demo123' }; }
            
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) { currentUser = JSON.parse(savedUser); showMain(); }
            else document.getElementById('authModal').classList.add('active');
        }
        
        async function showMain() {
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('mainApp').style.display = 'grid';
            document.getElementById('userNameDisplay').textContent = currentUser.username;
            
            const savedWatchlist = localStorage.getItem('user_watchlist');
            if (savedWatchlist) watchlist = JSON.parse(savedWatchlist);
            else watchlist = [{ symbol: 'AAPL', name: 'Apple Inc.' }, { symbol: 'MSFT', name: 'Microsoft' }, { symbol: 'TSLA', name: 'Tesla' }];
            
            if (!portfolioData[currentUser.id]) portfolioData[currentUser.id] = { balance: 100000, holdings: {} };
            
            await refreshAllQuotes();
            if (watchlist.length > 0) await selectStock(watchlist[0].symbol);
            updatePortfolio();
            updateGlobalRanking();
            
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => { refreshAllQuotes(); updateGlobalRanking(); }, 30000);
        }
        
        function handleAuth() {
            const u = document.getElementById('authUsername').value, p = document.getElementById('authPassword').value;
            const isLogin = document.getElementById('authTitle').textContent.includes('Login');
            if (isLogin) {
                const user = Object.values(users).find(x => x.username === u && x.password === p);
                if (user) { currentUser = user; localStorage.setItem('currentUser', JSON.stringify(user)); showMain(); }
                else alert('Invalid credentials');
            } else {
                if (users[u]) { alert('Username exists'); return; }
                const newId = Date.now().toString();
                users[u] = { id: newId, username: u, password: p };
                localStorage.setItem('trading_users', JSON.stringify(users));
                currentUser = users[u];
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                portfolioData[newId] = { balance: 100000, holdings: {} };
                localStorage.setItem('trading_portfolios', JSON.stringify(portfolioData));
                showMain();
            }
        }
        
        function logout() { currentUser = null; localStorage.removeItem('currentUser'); if (refreshInterval) clearInterval(refreshInterval); document.getElementById('mainApp').style.display = 'none'; document.getElementById('authModal').classList.add('active'); }
        
        // 事件绑定
        document.getElementById('authForm').addEventListener('submit', (e) => { e.preventDefault(); handleAuth(); });
        document.getElementById('authSwitch').addEventListener('click', () => {
            const t = document.getElementById('authTitle'), b = document.getElementById('authSubmitBtn');
            if (t.textContent.includes('Login')) { t.textContent = 'Create Account'; b.textContent = 'Sign Up'; } 
            else { t.textContent = 'Login to TradeWise Pro'; b.textContent = 'Login'; }
        });
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('refreshBtn').addEventListener('click', () => { refreshAllQuotes(); if (selectedStock) renderKline(); });
        document.getElementById('tradeShares').addEventListener('input', updatePreview);
        document.getElementById('executeTradeBtn').addEventListener('click', executeTrade);
        document.getElementById('addCurrentToWatchlistBtn').addEventListener('click', addCurrentToWatchlist);
        document.getElementById('syncDataBtn').addEventListener('click', saveAllDataToGitHub);
        document.getElementById('loadDataBtn').addEventListener('click', loadDataFromGitHub);
        document.getElementById('searchInput').addEventListener('input', (e) => { searchStocks(e.target.value); });
        document.getElementById('clearSearchBtn').addEventListener('click', () => { document.getElementById('searchInput').value = ''; document.getElementById('searchResults').classList.remove('show'); });
        document.addEventListener('click', (e) => { if (!e.target.closest('.search-container')) document.getElementById('searchResults').classList.remove('show'); });
        document.getElementById('buyTab').addEventListener('click', () => { currentOrderType = 'buy'; document.getElementById('buyTab').classList.add('active'); document.getElementById('sellTab').classList.remove('active'); document.getElementById('executeTradeBtn').className = 'submit-btn buy'; document.getElementById('executeTradeBtn').textContent = 'Buy Shares'; });
        document.getElementById('sellTab').addEventListener('click', () => { currentOrderType = 'sell'; document.getElementById('sellTab').classList.add('active'); document.getElementById('buyTab').classList.remove('active'); document.getElementById('executeTradeBtn').className = 'submit-btn sell'; document.getElementById('executeTradeBtn').textContent = 'Sell Shares'; });
        document.querySelectorAll('.timeframe-btn').forEach(btn => { btn.addEventListener('click', async () => { document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentTimeframe = btn.dataset.timeframe; await renderKline(); }); });
        let aiTimer; document.getElementById('aiQuickQuestion').addEventListener('input', (e) => { clearTimeout(aiTimer); aiTimer = setTimeout(() => askAI(e.target.value), 800); });
        
        initAuth();
    </script>
</body>
</html>
