<body>

    <script>
        const FINNHUB_API_KEY = 'd8g3tj9r01qlgcuh34c0d8g3tj9r01qlgcuh34cg';
        const DEEPSEEK_API_KEY = "sk-1f33b84b5ed746d09628b7834fc32170";
        
        // ============ 全局变量 ============
        let currentUser = null;
        let currentRepo = '';
        let currentToken = '';
        let watchlist = [];
        let selectedStock = null;
        let currentOrderType = 'buy';
        let klineChart = null;
        let refreshInterval = null;
        let currentTimeframe = '1M';
        
        // 云端数据结构
        let cloudUsers = {};      // { username: { id, username, password, createdAt } }
        let cloudPortfolios = {}; // { userId: { balance, holdings, transactions } }

        const stockDatabase = [
            { symbol: 'AAPL', name: 'Apple Inc.' }, { symbol: 'MSFT', name: 'Microsoft' },
            { symbol: 'GOOGL', name: 'Google' }, { symbol: 'AMZN', name: 'Amazon' },
            { symbol: 'TSLA', name: 'Tesla' }, { symbol: 'NVDA', name: 'NVIDIA' },
            { symbol: 'META', name: 'Meta' }, { symbol: 'JPM', name: 'JPMorgan' }
        ];

        // ============ GitHub 云端存储 ============
        function getGitHubConfig() {
            currentRepo = document.getElementById('githubRepo')?.value.trim() || localStorage.getItem('tradewise_github_repo') || '';
            currentToken = document.getElementById('githubToken')?.value.trim() || localStorage.getItem('tradewise_github_token') || '';
            if (currentRepo) localStorage.setItem('tradewise_github_repo', currentRepo);
            if (currentToken) localStorage.setItem('tradewise_github_token', currentToken);
            return { repo: currentRepo, token: currentToken };
        }

        async function saveToGitHub(data, filename) {
            const { repo, token } = getGitHubConfig();
            if (!repo || !token) throw new Error('GitHub not configured');
            
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
            
            // 检查文件是否存在
            let check = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            let sha = null;
            if (check.ok) { let exist = await check.json(); sha = exist.sha; }
            
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Update ${filename} - ${new Date().toLocaleString()}`,
                    content: content,
                    sha: sha
                })
            });
            
            if (!res.ok) throw new Error('Save failed');
            return true;
        }

        async function loadFromGitHub(filename) {
            const { repo, token } = getGitHubConfig();
            if (!repo || !token) throw new Error('GitHub not configured');
            
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (!res.ok) {
                if (res.status === 404) return null;
                throw new Error('Load failed');
            }
            
            const data = await res.json();
            const content = decodeURIComponent(escape(atob(data.content)));
            return JSON.parse(content);
        }

        // 保存所有云端数据
        async function saveAllCloudData() {
            if (!currentUser) return;
            
            const allData = {
                users: cloudUsers,
                portfolios: cloudPortfolios,
                lastUpdated: new Date().toISOString(),
                version: '2.0'
            };
            
            try {
                await saveToGitHub(allData, 'tradewise_cloud_data.json');
                document.getElementById('saveStatus').innerHTML = '✓ Saved';
                setTimeout(() => { if(document.getElementById('saveStatus')) document.getElementById('saveStatus').innerHTML = ''; }, 2000);
                return true;
            } catch(e) {
                console.error('Save error:', e);
                document.getElementById('saveStatus').innerHTML = '⚠️ Save failed';
                setTimeout(() => { if(document.getElementById('saveStatus')) document.getElementById('saveStatus').innerHTML = ''; }, 2000);
                return false;
            }
        }

        // 加载所有云端数据
        async function loadAllCloudData() {
            try {
                const data = await loadFromGitHub('tradewise_cloud_data.json');
                if (data) {
                    cloudUsers = data.users || {};
                    cloudPortfolios = data.portfolios || {};
                    
                    // 确保 demo 用户存在
                    if (!cloudUsers['demo']) {
                        cloudUsers['demo'] = { id: 'user_demo', username: 'demo', password: 'demo123', createdAt: new Date().toISOString() };
                    }
                    if (!cloudPortfolios['user_demo']) {
                        cloudPortfolios['user_demo'] = { balance: 100000, holdings: {}, transactions: [] };
                    }
                    
                    document.getElementById('cloudConnectionStatus').innerHTML = '✅ Cloud connected';
                    document.getElementById('cloudConnectionStatus').style.color = '#00c853';
                    return true;
                } else {
                    // 初始化新数据
                    cloudUsers = {
                        'demo': { id: 'user_demo', username: 'demo', password: 'demo123', createdAt: new Date().toISOString() }
                    };
                    cloudPortfolios = {
                        'user_demo': { balance: 100000, holdings: {}, transactions: [] }
                    };
                    await saveAllCloudData();
                    document.getElementById('cloudConnectionStatus').innerHTML = '✅ Cloud ready';
                    return true;
                }
            } catch(e) {
                console.error('Load error:', e);
                document.getElementById('cloudConnectionStatus').innerHTML = '⚠️ Config GitHub first';
                return false;
            }
        }

        // ============ 用户认证（云端） ============
        async function handleLogin() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            
            if (!username || !password) {
                showToast('Please enter username and password', true);
                return;
            }
            
            // 先从云端加载最新数据
            await loadAllCloudData();
            
            const user = cloudUsers[username];
            if (user && user.password === password) {
                currentUser = user;
                localStorage.setItem('tradewise_currentUser', JSON.stringify(user));
                
                // 加载用户的自选股
                const userWatchlist = localStorage.getItem(`watchlist_${user.id}`);
                if (userWatchlist) {
                    watchlist = JSON.parse(userWatchlist);
                } else {
                    watchlist = [
                        { symbol: 'AAPL', name: 'Apple Inc.' },
                        { symbol: 'MSFT', name: 'Microsoft' },
                        { symbol: 'TSLA', name: 'Tesla Inc.' }
                    ];
                }
                
                showMainApp();
                showToast(`Welcome back, ${username}!`);
            } else {
                showToast('Invalid username or password', true);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            
            if (!username || !password) {
                showToast('Please enter username and password', true);
                return;
            }
            
            if (username.length < 3) {
                showToast('Username must be at least 3 characters', true);
                return;
            }
            
            // 先从云端加载最新数据
            await loadAllCloudData();
            
            if (cloudUsers[username]) {
                showToast('Username already exists!', true);
                return;
            }
            
            const newId = 'user_' + Date.now();
            const newUser = { id: newId, username: username, password: password, createdAt: new Date().toISOString() };
            cloudUsers[username] = newUser;
            cloudPortfolios[newId] = { balance: 100000, holdings: {}, transactions: [] };
            
            // 保存到云端
            const saved = await saveAllCloudData();
            if (saved) {
                currentUser = newUser;
                localStorage.setItem('tradewise_currentUser', JSON.stringify(newUser));
                watchlist = [
                    { symbol: 'AAPL', name: 'Apple Inc.' },
                    { symbol: 'MSFT', name: 'Microsoft' },
                    { symbol: 'TSLA', name: 'Tesla Inc.' }
                ];
                showMainApp();
                showToast(`Welcome ${username}! Account created.`);
            } else {
                showToast('Failed to create account. Check GitHub config.', true);
            }
        }

        async function syncPortfolioToCloud() {
            if (!currentUser) return;
            
            const portfolio = cloudPortfolios[currentUser.id] || { balance: 100000, holdings: {}, transactions: [] };
            
            // 更新持仓市值
            for (let symbol in portfolio.holdings) {
                const stock = watchlist.find(s => s.symbol === symbol);
                if (stock && stock.price) {
                    portfolio.holdings[symbol].currentPrice = stock.price;
                }
            }
            cloudPortfolios[currentUser.id] = portfolio;
            await saveAllCloudData();
        }

        function updateRankingFromCloud() {
            const rankings = [];
            for (let username in cloudUsers) {
                const user = cloudUsers[username];
                const portfolio = cloudPortfolios[user.id] || { balance: 100000, holdings: {} };
                let totalValue = portfolio.balance;
                
                for (let symbol in portfolio.holdings) {
                    const holding = portfolio.holdings[symbol];
                    const stock = watchlist.find(s => s.symbol === symbol);
                    const price = stock?.price || holding.avgPrice || 150;
                    totalValue += holding.shares * price;
                }
                
                rankings.push({ username: user.username, totalValue, userId: user.id });
            }
            
            rankings.sort((a, b) => b.totalValue - a.totalValue);
            
            const container = document.getElementById('rankingList');
            if (!container) return;
            
            container.innerHTML = rankings.slice(0, 10).map((r, i) => `
                <div class="ranking-item">
                    <div class="ranking-rank">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`}</div>
                    <div class="ranking-name">${r.username} ${currentUser?.username === r.username ? '(you)' : ''}</div>
                    <div class="ranking-value">$${r.totalValue.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                </div>
            `).join('');
        }

        // ============ 股票功能 ============
        async function getQuote(symbol) {
            try {
                const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_API_KEY}`);
                const data = await res.json();
                if (data && data.c) return { price: data.c, changePercent: data.dp };
            } catch(e) {}
            const prices = { 'AAPL': 175, 'MSFT': 420, 'TSLA': 240, 'GOOGL': 138, 'AMZN': 145, 'NVDA': 900 };
            const base = prices[symbol] || 150;
            return { price: base * (1 + (Math.random() - 0.5) * 0.02), changePercent: (Math.random() - 0.5) * 2 };
        }

        async function refreshPrices() {
            for (let stock of watchlist) {
                const quote = await getQuote(stock.symbol);
                stock.price = quote.price;
                stock.changePercent = quote.changePercent;
            }
            if (selectedStock) {
                const quote = await getQuote(selectedStock.symbol);
                selectedStock.price = quote.price;
                selectedStock.changePercent = quote.changePercent;
                document.getElementById('currentPrice').textContent = `$${selectedStock.price.toFixed(2)}`;
                const change = document.getElementById('currentChange');
                change.textContent = `${selectedStock.changePercent >= 0 ? '+' : ''}${selectedStock.changePercent.toFixed(2)}%`;
                change.className = `selected-change ${selectedStock.changePercent >= 0 ? 'positive' : 'negative'}`;
            }
            renderWatchlist();
            updatePortfolioDisplay();
            updateRankingFromCloud();
            if (selectedStock) document.getElementById('marketPrice').value = `$${selectedStock.price.toFixed(2)}`;
            updatePreview();
            
            // 同步到云端
            await syncPortfolioToCloud();
        }

        function generateCandles(days = 30) {
            let candles = [], price = 150;
            for (let i = 0; i < days; i++) {
                let open = price, close = price * (1 + (Math.random() - 0.5) * 0.03);
                candles.push({ open, high: Math.max(open, close) * 1.01, low: Math.min(open, close) * 0.99, close });
                price = close;
            }
            return candles;
        }

        async function renderKline() {
            if (!selectedStock) return;
            let candles = generateCandles();
            if (klineChart) klineChart.dispose();
            klineChart = echarts.init(document.getElementById('klineChart'));
            klineChart.setOption({
                title: { text: `${selectedStock.symbol} - Chart`, textStyle: { color: '#fff' } },
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(20,24,49,0.95)', textStyle: { color: '#fff' } },
                xAxis: { type: 'category', data: candles.map((_, i) => i+1), axisLabel: { color: '#fff' } },
                yAxis: { scale: true, axisLabel: { color: '#fff' } },
                series: [{ type: 'candlestick', data: candles.map(c => [c.open, c.close, c.low, c.high]), itemStyle: { color: '#00c853', color0: '#ff3b30' } }],
                backgroundColor: 'transparent'
            });
        }

        function renderWatchlist() {
            let container = document.getElementById('watchlistContainer');
            container.innerHTML = watchlist.map(stock => `
                <div class="watchlist-item ${selectedStock?.symbol === stock.symbol ? 'active' : ''}" onclick="selectStock('${stock.symbol}')">
                    <div class="watchlist-item-info"><div class="watchlist-symbol">${stock.symbol}</div><div class="watchlist-name">${stock.name}</div></div>
                    <div class="watchlist-quote"><div class="watchlist-price">$${stock.price?.toFixed(2) || '0.00'}</div>
                    <div class="watchlist-change ${stock.changePercent >= 0 ? 'positive' : 'negative'}">${stock.changePercent >= 0 ? '+' : ''}${stock.changePercent?.toFixed(2) || '0'}%</div></div>
                    <button class="remove-stock" onclick="removeStock('${stock.symbol}', event)">✕</button>
                </div>
            `).join('');
        }

        window.selectStock = async (symbol) => {
            let stock = watchlist.find(s => s.symbol === symbol);
            if (stock) {
                let quote = await getQuote(symbol);
                selectedStock = { ...stock, price: quote.price, changePercent: quote.changePercent };
                document.getElementById('currentPrice').textContent = `$${selectedStock.price.toFixed(2)}`;
                document.getElementById('marketPrice').value = `$${selectedStock.price.toFixed(2)}`;
                renderWatchlist();
                await renderKline();
                updatePreview();
            }
        };

        window.removeStock = (symbol, event) => {
            event.stopPropagation();
            watchlist = watchlist.filter(s => s.symbol !== symbol);
            localStorage.setItem(`watchlist_${currentUser.id}`, JSON.stringify(watchlist));
            if (selectedStock?.symbol === symbol && watchlist.length) selectStock(watchlist[0].symbol);
            renderWatchlist();
        };

        function addToWatchlist() {
            if (!selectedStock) return;
            if (!watchlist.find(s => s.symbol === selectedStock.symbol)) {
                watchlist.push({ symbol: selectedStock.symbol, name: selectedStock.name });
                localStorage.setItem(`watchlist_${currentUser.id}`, JSON.stringify(watchlist));
                renderWatchlist();
                showToast(`Added ${selectedStock.symbol}`);
            }
        }

        function searchStocks(query) {
            if (!query) { document.getElementById('searchResults').classList.remove('show'); return; }
            let results = stockDatabase.filter(s => s.symbol.toLowerCase().includes(query.toLowerCase()) || s.name.toLowerCase().includes(query.toLowerCase())).slice(0, 8);
            let container = document.getElementById('searchResults');
            if (!results.length) { container.classList.remove('show'); return; }
            container.innerHTML = results.map(s => `<div class="search-result-item" onclick="addStock('${s.symbol}', '${s.name}')"><div class="result-symbol">${s.symbol}</div><div class="result-name">${s.name}</div></div>`).join('');
            container.classList.add('show');
        }

        window.addStock = async (symbol, name) => {
            if (!watchlist.find(s => s.symbol === symbol)) {
                watchlist.push({ symbol, name });
                localStorage.setItem(`watchlist_${currentUser.id}`, JSON.stringify(watchlist));
                renderWatchlist();
            }
            let quote = await getQuote(symbol);
            selectedStock = { symbol, name, price: quote.price, changePercent: quote.changePercent };
            document.getElementById('currentPrice').textContent = `$${selectedStock.price.toFixed(2)}`;
            document.getElementById('marketPrice').value = `$${selectedStock.price.toFixed(2)}`;
            renderWatchlist();
            await renderKline();
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').classList.remove('show');
        };

        function updatePortfolioDisplay() {
            if (!currentUser) return;
            const portfolio = cloudPortfolios[currentUser.id] || { balance: 100000, holdings: {} };
            document.getElementById('balance').textContent = `$${portfolio.balance.toFixed(2)}`;
            
            let container = document.getElementById('portfolioContainer');
            let holdings = Object.entries(portfolio.holdings || {});
            if (!holdings.length) { container.innerHTML = '<div style="text-align:center;padding:20px;">No positions</div>'; return; }
            
            container.innerHTML = holdings.map(([symbol, h]) => {
                let stock = watchlist.find(s => s.symbol === symbol);
                let currentPrice = stock?.price || h.avgPrice;
                let pnl = (currentPrice - h.avgPrice) * h.shares;
                let pnlPercent = ((currentPrice - h.avgPrice) / h.avgPrice * 100) || 0;
                return `<div class="portfolio-item"><div class="portfolio-header"><span>${symbol}</span><span class="${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)} (${pnlPercent.toFixed(2)}%)</span></div>
                        <div class="portfolio-details"><span>${h.shares} shares @ $${h.avgPrice.toFixed(2)}</span><span>Now: $${currentPrice.toFixed(2)}</span></div></div>`;
            }).join('');
        }

        function updatePreview() {
            let shares = parseInt(document.getElementById('tradeShares').value) || 0;
            document.getElementById('estimatedTotal').textContent = `$${(shares * (selectedStock?.price || 0)).toFixed(2)}`;
        }

        async function executeTrade() {
            if (!currentUser || !selectedStock) return;
            let shares = parseInt(document.getElementById('tradeShares').value);
            if (shares <= 0) { showToast('Invalid quantity', true); return; }
            
            let price = selectedStock.price;
            let total = shares * price;
            let portfolio = cloudPortfolios[currentUser.id] || { balance: 100000, holdings: {}, transactions: [] };
            
            if (currentOrderType === 'buy') {
                if (portfolio.balance < total) { showToast('Insufficient balance', true); return; }
                portfolio.balance -= total;
                if (!portfolio.holdings[selectedStock.symbol]) {
                    portfolio.holdings[selectedStock.symbol] = { symbol: selectedStock.symbol, shares: 0, avgPrice: 0 };
                }
                let h = portfolio.holdings[selectedStock.symbol];
                h.avgPrice = (h.avgPrice * h.shares + total) / (h.shares + shares);
                h.shares += shares;
                showToast(`✓ Bought ${shares} ${selectedStock.symbol}`);
            } else {
                let h = portfolio.holdings[selectedStock.symbol];
                if (!h || h.shares < shares) { showToast('Insufficient shares', true); return; }
                portfolio.balance += total;
                h.shares -= shares;
                if (h.shares === 0) delete portfolio.holdings[selectedStock.symbol];
                showToast(`✓ Sold ${shares} ${selectedStock.symbol}`);
            }
            
            // 记录交易
            if (!portfolio.transactions) portfolio.transactions = [];
            portfolio.transactions.push({
                type: currentOrderType,
                symbol: selectedStock.symbol,
                shares: shares,
                price: price,
                total: total,
                time: new Date().toISOString()
            });
            
            cloudPortfolios[currentUser.id] = portfolio;
            
            // 保存到云端
            const saved = await saveAllCloudData();
            if (saved) {
                updatePortfolioDisplay();
                updateRankingFromCloud();
            } else {
                showToast('Trade executed but cloud sync failed', true);
            }
        }

        async function askAI() {
            let question = document.getElementById('aiQuickQuestion').value;
            if (!question || !selectedStock) return;
            let div = document.getElementById('aiQuickAnswer');
            div.innerHTML = '🤔 Thinking...';
            try {
                let res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
                    body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: `Stock: ${selectedStock.symbol} at $${selectedStock.price}. Question: ${question}` }], max_tokens: 200 })
                });
                let data = await res.json();
                div.innerHTML = data.choices[0].message.content;
            } catch(e) { div.innerHTML = '⚠️ AI unavailable'; }
        }

        function showToast(msg, isError = false) {
            let oldToast = document.querySelector('.toast');
            if (oldToast) oldToast.remove();
            let toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            toast.style.background = isError ? 'rgba(255,59,48,0.9)' : 'rgba(0,200,83,0.9)';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleAuthMode() {
            let title = document.getElementById('authTitle');
            let btn = document.getElementById('authSubmitBtn');
            let switchText = document.getElementById('authSwitch');
            
            if (title.textContent === 'Login to TradeWise Pro') {
                title.textContent = 'Create Account';
                btn.textContent = 'Sign Up';
                switchText.innerHTML = '← Back to Login';
            } else {
                title.textContent = 'Login to TradeWise Pro';
                btn.textContent = 'Login';
                switchText.innerHTML = '📝 Create new account';
            }
            document.getElementById('authUsername').value = '';
            document.getElementById('authPassword').value = '';
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('tradewise_currentUser');
            if (refreshInterval) clearInterval(refreshInterval);
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('authModal').classList.remove('hidden');
            document.getElementById('authTitle').textContent = 'Login to TradeWise Pro';
            document.getElementById('authSubmitBtn').textContent = 'Login';
            document.getElementById('authSwitch').innerHTML = '📝 Create new account';
        }

        async function showMainApp() {
            document.getElementById('authModal').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userNameDisplay').textContent = currentUser.username;
            
            // 加载用户的自选股
            let savedWatchlist = localStorage.getItem(`watchlist_${currentUser.id}`);
            if (savedWatchlist) {
                watchlist = JSON.parse(savedWatchlist);
            } else {
                watchlist = [
                    { symbol: 'AAPL', name: 'Apple Inc.' },
                    { symbol: 'MSFT', name: 'Microsoft' },
                    { symbol: 'TSLA', name: 'Tesla Inc.' }
                ];
            }
            
            await refreshPrices();
            if (watchlist.length) await selectStock(watchlist[0].symbol);
            updatePortfolioDisplay();
            updateRankingFromCloud();
            
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(async () => { 
                await refreshPrices(); 
                updateRankingFromCloud();
            }, 30000);
        }

        // ============ 初始化 ============
        async function init() {
            // 加载保存的 GitHub 配置
            const savedRepo = localStorage.getItem('tradewise_github_repo');
            const savedToken = localStorage.getItem('tradewise_github_token');
            if (savedRepo) document.getElementById('githubRepo').value = savedRepo;
            if (savedToken) document.getElementById('githubToken').value = savedToken;
            
            // 尝试加载云端数据
            await loadAllCloudData();
            
            // 检查是否有已登录用户
            const savedUser = localStorage.getItem('tradewise_currentUser');
            if (savedUser && cloudUsers[JSON.parse(savedUser).username]) {
                currentUser = JSON.parse(savedUser);
                showMainApp();
            } else {
                document.getElementById('authModal').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        }

        // 事件绑定
        document.getElementById('authSubmitBtn').addEventListener('click', () => {
            const isLogin = document.getElementById('authTitle').textContent === 'Login to TradeWise Pro';
            if (isLogin) handleLogin(); else handleRegister();
        });
        document.getElementById('authSwitch').addEventListener('click', toggleAuthMode);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('refreshBtn').addEventListener('click', () => { refreshPrices(); if(selectedStock) renderKline(); });
        document.getElementById('tradeShares').addEventListener('input', updatePreview);
        document.getElementById('executeTradeBtn').addEventListener('click', executeTrade);
        document.getElementById('addCurrentToWatchlistBtn').addEventListener('click', addToWatchlist);
        document.getElementById('searchInput').addEventListener('input', (e) => searchStocks(e.target.value));
        
        document.getElementById('buyTab').addEventListener('click', () => {
            currentOrderType = 'buy';
            document.getElementById('buyTab').classList.add('active');
            document.getElementById('sellTab').classList.remove('active');
            document.getElementById('executeTradeBtn').className = 'submit-btn buy';
            document.getElementById('executeTradeBtn').textContent = 'Buy';
        });
        document.getElementById('sellTab').addEventListener('click', () => {
            currentOrderType = 'sell';
            document.getElementById('sellTab').classList.add('active');
            document.getElementById('buyTab').classList.remove('active');
            document.getElementById('executeTradeBtn').className = 'submit-btn sell';
            document.getElementById('executeTradeBtn').textContent = 'Sell';
        });
        
        document.querySelectorAll('.timeframe-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTimeframe = btn.dataset.timeframe;
                await renderKline();
            });
        });
        
        let aiTimer;
        document.getElementById('aiQuickQuestion').addEventListener('input', (e) => {
            clearTimeout(aiTimer);
            aiTimer = setTimeout(() => askAI(), 800);
        });
        
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) document.getElementById('searchResults').classList.remove('show');
        });
        
        document.getElementById('authUsername').addEventListener('keypress', (e) => { if(e.key === 'Enter') { if(document.getElementById('authTitle').textContent === 'Login to TradeWise Pro') handleLogin(); else handleRegister(); } });
        document.getElementById('authPassword').addEventListener('keypress', (e) => { if(e.key === 'Enter') { if(document.getElementById('authTitle').textContent === 'Login to TradeWise Pro') handleLogin(); else handleRegister(); } });
        
        // GitHub 配置变化时保存
        document.getElementById('githubRepo').addEventListener('change', () => {
            const repo = document.getElementById('githubRepo').value;
            if (repo) localStorage.setItem('tradewise_github_repo', repo);
        });
        document.getElementById('githubToken').addEventListener('change', () => {
            const token = document.getElementById('githubToken').value;
            if (token) localStorage.setItem('tradewise_github_token', token);
        });
        
        init();
    </script>
</body>
</html>
