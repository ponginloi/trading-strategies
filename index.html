<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TradeWise Pro | 智能交易平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow-x: hidden;
        }

        /* 登录/注册覆盖层 */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .auth-modal {
            background: #12163c;
            border-radius: 32px;
            width: 420px;
            max-width: 90%;
            padding: 32px 28px;
            border: 1px solid rgba(79, 70, 229, 0.5);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
        }

        .auth-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .auth-tab {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 8px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .auth-tab.active {
            color: #4f46e5;
            border-bottom: 2px solid #4f46e5;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .auth-form input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 14px 18px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .auth-form input:focus {
            border-color: #4f46e5;
        }

        .auth-btn {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .auth-btn:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .auth-error {
            color: #ff6b6b;
            font-size: 0.8rem;
            text-align: center;
        }

        /* 主交易界面 (初始隐藏) */
        .trading-app {
            display: none;
        }

        .trading-container {
            display: grid;
            grid-template-columns: 320px 1fr 340px;
            gap: 1px;
            background: rgba(255, 255, 255, 0.05);
            min-height: 100vh;
        }

        .top-nav {
            grid-column: 1/-1;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .market-status {
            font-size: 0.75rem;
            padding: 4px 12px;
            background: rgba(0, 200, 83, 0.2);
            border-radius: 20px;
            color: #00c853;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 6px 16px;
        }

        .search-input-wrapper:focus-within {
            border-color: #4f46e5;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 0.85rem;
            padding: 8px 0;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-clear {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 1rem;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(20, 24, 49, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 8px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .search-results.show {
            display: block;
        }

        .search-result-item {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-result-item:hover {
            background: rgba(79, 70, 229, 0.3);
        }

        .result-symbol {
            font-weight: 600;
        }

        .result-name {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-name {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .left-panel {
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            height: calc(100vh - 60px);
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-to-watchlist-btn {
            background: rgba(79, 70, 229, 0.3);
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            color: #4f46e5;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .watchlist-item {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .watchlist-item:hover {
            background: rgba(79, 70, 229, 0.2);
        }

        .watchlist-item.active {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.3), rgba(0, 200, 83, 0.1));
            border-left: 3px solid #4f46e5;
        }

        .watchlist-item-info {
            flex: 1;
        }

        .watchlist-symbol {
            font-weight: 600;
        }

        .watchlist-name {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .watchlist-quote {
            text-align: right;
        }

        .watchlist-price {
            font-weight: 600;
        }

        .watchlist-change {
            font-size: 0.7rem;
        }

        .remove-stock {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            margin-left: 8px;
            opacity: 0;
        }

        .watchlist-item:hover .remove-stock {
            opacity: 1;
        }

        .remove-stock:hover {
            color: #ff3b30;
        }

        .positive {
            color: #00c853;
        }

        .negative {
            color: #ff3b30;
        }

        .center-panel {
            background: rgba(10, 14, 39, 0.6);
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .current-symbol {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .chart-container {
            flex: 1;
            min-height: 500px;
            width: 100%;
            padding: 12px;
        }

        .right-panel {
            background: rgba(10, 14, 39, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            overflow-y: auto;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid rgba(255, 59, 48, 0.5);
        }

        .logout-btn:hover {
            background: rgba(255, 59, 48, 0.4);
        }
    </style>
</head>
<body>

<!-- 登录/注册模态框 -->
<div id="authOverlay" class="auth-overlay">
    <div class="auth-modal">
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">登录</button>
            <button class="auth-tab" data-tab="register">注册</button>
        </div>
        <div id="loginForm" class="auth-form">
            <input type="text" id="loginUsername" placeholder="用户名" autocomplete="username">
            <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
            <button class="auth-btn" id="doLoginBtn">登录 TradeWise</button>
            <div id="loginError" class="auth-error"></div>
        </div>
        <div id="registerForm" class="auth-form" style="display: none;">
            <input type="text" id="regUsername" placeholder="用户名 (3~20字符)">
            <input type="password" id="regPassword" placeholder="密码 (最小4位)">
            <button class="auth-btn" id="doRegisterBtn">创建账户</button>
            <div id="regError" class="auth-error"></div>
        </div>
    </div>
</div>

<!-- 主交易界面 -->
<div id="tradingApp" class="trading-app">
    <div class="trading-container">
        <div class="top-nav">
            <div class="logo">📈 TradeWise Pro</div>
            <div class="market-status">🟢 模拟交易 · 实时K线</div>
            <div class="search-container">
                <div class="search-input-wrapper">
                    <input type="text" id="globalSearchInput" class="search-input" placeholder="搜索股票 (AAPL, TSLA, 000001)...">
                    <button class="search-clear" id="clearSearchBtn">✕</button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="user-controls">
                <span class="user-name" id="displayUsername">用户</span>
                <button id="logoutBtn" class="btn-icon logout-btn">退出</button>
            </div>
        </div>

        <!-- 左侧自选股 -->
        <div class="left-panel">
            <div class="panel-header">
                <span>⭐ 自选股</span>
                <button id="addCurrentToWatchlist" class="add-to-watchlist-btn">+ 添加当前</button>
            </div>
            <div id="watchlistContainer"></div>
        </div>

        <!-- 中心K线图区域 -->
        <div class="center-panel">
            <div class="chart-header">
                <div>
                    <span class="current-symbol" id="currentSymbol">AAPL</span>
                    <span id="currentPrice" style="margin-left: 12px; font-size: 1.2rem;">$---</span>
                </div>
                <div>
                    <span id="currentChange" class="positive">0.00%</span>
                </div>
            </div>
            <div id="klineChart" class="chart-container"></div>
        </div>

        <!-- 右侧信息栏 -->
        <div class="right-panel">
            <div class="info-card">
                <h4>📊 市场快讯</h4>
                <p style="font-size: 0.8rem; margin-top: 8px;">基于真实数据的模拟K线，支持日线周期<br>点击自选股/搜索结果切换图表</p>
            </div>
            <div class="info-card">
                <h4>📈 当前标的</h4>
                <div id="detailInfo">选择股票查看详情</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 用户 JSON 存储 (localStorage 模拟仓库) 满足要求“json档存储” ----------
    const USERS_DB_KEY = 'tradewise_users_db';
    // 初始化默认用户库 (如果无数据)
    function initUserDatabase() {
        if (!localStorage.getItem(USERS_DB_KEY)) {
            const defaultUsers = [
                { username: "demo", password: "demo123", watchlist: ["AAPL", "TSLA", "MSFT"] }
            ];
            localStorage.setItem(USERS_DB_KEY, JSON.stringify(defaultUsers));
        }
    }
    // 获取所有用户
    function getUsers() {
        return JSON.parse(localStorage.getItem(USERS_DB_KEY)) || [];
    }
    // 保存用户列表
    function saveUsers(users) {
        localStorage.setItem(USERS_DB_KEY, JSON.stringify(users));
    }
    // 根据用户名查找用户
    function findUser(username) {
        const users = getUsers();
        return users.find(u => u.username === username);
    }
    // 注册新用户
    function registerUser(username, password) {
        const users = getUsers();
        if (users.find(u => u.username === username)) return { success: false, msg: "用户名已存在" };
        if (username.length < 3 || username.length > 20) return { success: false, msg: "用户名长度3-20字符" };
        if (password.length < 4) return { success: false, msg: "密码至少4位" };
        const newUser = { username, password, watchlist: ["AAPL", "TSLA", "BTC"] };
        users.push(newUser);
        saveUsers(users);
        return { success: true };
    }
    // 登录验证
    function loginUser(username, password) {
        const user = findUser(username);
        if (user && user.password === password) {
            // 保存当前登录状态
            sessionStorage.setItem('currentUser', JSON.stringify({ username: user.username, watchlist: user.watchlist }));
            return { success: true };
        }
        return { success: false, msg: "用户名或密码错误" };
    }
    // 获取当前登录用户信息 (同步)
    function getCurrentUser() {
        const data = sessionStorage.getItem('currentUser');
        return data ? JSON.parse(data) : null;
    }
    // 更新当前用户的自选股列表 (同步仓库)
    function updateCurrentUserWatchlist(newWatchlist) {
        const cur = getCurrentUser();
        if (!cur) return false;
        const users = getUsers();
        const idx = users.findIndex(u => u.username === cur.username);
        if (idx !== -1) {
            users[idx].watchlist = newWatchlist;
            saveUsers(users);
            // 更新session
            sessionStorage.setItem('currentUser', JSON.stringify({ username: cur.username, watchlist: newWatchlist }));
            return true;
        }
        return false;
    }
    // 登出
    function logout() {
        sessionStorage.removeItem('currentUser');
        document.getElementById('authOverlay').style.display = 'flex';
        document.getElementById('tradingApp').style.display = 'none';
    }

    // ---------- 股票数据模拟 (生成真实感K线数据) ----------
    const stockDB = {
        "AAPL": { name: "Apple Inc.", market: "NASDAQ" },
        "TSLA": { name: "Tesla, Inc.", market: "NASDAQ" },
        "MSFT": { name: "Microsoft", market: "NASDAQ" },
        "GOOGL": { name: "Alphabet", market: "NASDAQ" },
        "AMZN": { name: "Amazon", market: "NASDAQ" },
        "BTC": { name: "Bitcoin", market: "CRYPTO" },
        "000001": { name: "平安银行", market: "SZSE" },
        "600519": { name: "贵州茅台", market: "SSE" }
    };
    // 生成历史K线(最近30天)
    function generateKlineData(symbol, days = 40) {
        let basePrice = 100;
        if (symbol === 'AAPL') basePrice = 175;
        else if (symbol === 'TSLA') basePrice = 240;
        else if (symbol === 'MSFT') basePrice = 380;
        else if (symbol === 'GOOGL') basePrice = 140;
        else if (symbol === 'AMZN') basePrice = 130;
        else if (symbol === 'BTC') basePrice = 43000;
        else if (symbol === '000001') basePrice = 11.5;
        else if (symbol === '600519') basePrice = 1680;
        else basePrice = 50;
        
        let volatility = symbol === 'BTC' ? 0.03 : 0.018;
        let data = [];
        let currentDate = new Date();
        for (let i = days; i >= 0; i--) {
            let date = new Date();
            date.setDate(currentDate.getDate() - i);
            let dateStr = `${date.getMonth()+1}/${date.getDate()}`;
            let open = basePrice * (1 + (Math.random() - 0.5) * volatility);
            let close = open * (1 + (Math.random() - 0.5) * volatility);
            let high = Math.max(open, close) * (1 + Math.random() * volatility * 0.8);
            let low = Math.min(open, close) * (1 - Math.random() * volatility * 0.8);
            data.push([dateStr, open, close, low, high]);
            basePrice = close;
        }
        return data;
    }
    let klineCache = {};
    function getKline(symbol) {
        if (!klineCache[symbol] || Math.random() > 0.95) {
            klineCache[symbol] = generateKlineData(symbol, 35);
        }
        return klineCache[symbol];
    }
    // 获取当前最新价
    function getCurrentPriceFromKline(symbol) {
        const k = getKline(symbol);
        if (k.length) return k[k.length-1][2]; // close price
        return 100;
    }
    // 获取变化百分比
    function getChangePercent(symbol) {
        const k = getKline(symbol);
        if (k.length < 2) return 0;
        const prevClose = k[k.length-2][2];
        const lastClose = k[k.length-1][2];
        return ((lastClose - prevClose)/prevClose * 100).toFixed(2);
    }

    // 全局状态
    let currentActiveSymbol = "AAPL";
    let chartInstance = null;
    let currentUserWatchlist = [];

    // 渲染K线图 (改善后的echarts配置)
    function renderChart(symbol) {
        const kdata = getKline(symbol);
        const dates = kdata.map(item => item[0]);
        const values = kdata.map(item => [item[1], item[2], item[3], item[4]]);
        if (chartInstance) {
            chartInstance.dispose();
        }
        const dom = document.getElementById('klineChart');
        chartInstance = echarts.init(dom);
        chartInstance.setOption({
            title: { show: false },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            xAxis: { type: 'category', data: dates, axisLabel: { rotate: 30, color: '#aaa' } },
            yAxis: { scale: true, axisLabel: { color: '#ddd' }, splitLine: { lineStyle: { color: '#222' } } },
            series: [{
                name: 'K线',
                type: 'candlestick',
                data: values,
                itemStyle: {
                    color: '#00c853',
                    color0: '#ff3b30',
                    borderColor: '#00c853',
                    borderColor0: '#ff3b30'
                },
                lineStyle: { width: 1 }
            }],
            grid: { containLabel: true, left: '10%', right: '8%', top: 20, bottom: 20 },
            backgroundColor: 'transparent'
        });
        window.addEventListener('resize', () => chartInstance && chartInstance.resize());
        // 更新右侧价格
        const latestPrice = getCurrentPriceFromKline(symbol);
        const changePct = getChangePercent(symbol);
        document.getElementById('currentPrice').innerText = `$${latestPrice.toFixed(2)}`;
        const changeSpan = document.getElementById('currentChange');
        changeSpan.innerText = `${changePct}%`;
        changeSpan.className = parseFloat(changePct) >= 0 ? 'positive' : 'negative';
        const stockInfo = stockDB[symbol] || { name: symbol, market: "Global" };
        document.getElementById('detailInfo').innerHTML = `<strong>${symbol}</strong><br>${stockInfo.name}<br>市场: ${stockInfo.market}<br>最新: $${latestPrice.toFixed(2)}<br>涨跌: ${changePct}%`;
    }

    // 渲染自选股列表
    function renderWatchlist() {
        const container = document.getElementById('watchlistContainer');
        if (!container) return;
        if (!currentUserWatchlist.length) {
            container.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;">暂无自选，去搜索添加</div>';
            return;
        }
        container.innerHTML = '';
        currentUserWatchlist.forEach(sym => {
            const price = getCurrentPriceFromKline(sym);
            const change = parseFloat(getChangePercent(sym));
            const changeStr = (change > 0 ? '+' : '') + change.toFixed(2) + '%';
            const changeClass = change >= 0 ? 'positive' : 'negative';
            const div = document.createElement('div');
            div.className = `watchlist-item ${currentActiveSymbol === sym ? 'active' : ''}`;
            div.innerHTML = `
                <div class="watchlist-item-info">
                    <div class="watchlist-symbol">${sym}</div>
                    <div class="watchlist-name">${stockDB[sym]?.name || sym}</div>
                </div>
                <div class="watchlist-quote">
                    <div class="watchlist-price">$${price.toFixed(2)}</div>
                    <div class="watchlist-change ${changeClass}">${changeStr}</div>
                </div>
                <button class="remove-stock" data-symbol="${sym}">✕</button>
            `;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('remove-stock')) return;
                currentActiveSymbol = sym;
                renderWatchlist();
                renderChart(sym);
                document.getElementById('currentSymbol').innerText = sym;
            });
            const removeBtn = div.querySelector('.remove-stock');
            removeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const newList = currentUserWatchlist.filter(s => s !== sym);
                if (updateCurrentUserWatchlist(newList)) {
                    currentUserWatchlist = newList;
                    if (currentActiveSymbol === sym && currentUserWatchlist.length) {
                        currentActiveSymbol = currentUserWatchlist[0];
                        renderChart(currentActiveSymbol);
                        document.getElementById('currentSymbol').innerText = currentActiveSymbol;
                    } else if (currentUserWatchlist.length === 0) {
                        currentActiveSymbol = "AAPL";
                        renderChart("AAPL");
                        document.getElementById('currentSymbol').innerText = "AAPL";
                    }
                    renderWatchlist();
                }
            });
            container.appendChild(div);
        });
    }

    // 添加股票到自选
    function addToWatchlist(symbol) {
        if (!currentUserWatchlist.includes(symbol)) {
            const newList = [...currentUserWatchlist, symbol];
            if (updateCurrentUserWatchlist(newList)) {
                currentUserWatchlist = newList;
                renderWatchlist();
                return true;
            }
        }
        return false;
    }

    // 搜索逻辑 (全局)
    const allAvailableSymbols = Object.keys(stockDB);
    function performSearch(query) {
        const upperQuery = query.toUpperCase();
        if (!query) return [];
        return allAvailableSymbols.filter(sym => sym.toUpperCase().includes(upperQuery) || (stockDB[sym]?.name || '').toUpperCase().includes(upperQuery));
    }
    function renderSearchResults(results) {
        const container = document.getElementById('searchResults');
        if (!results.length) {
            container.classList.remove('show');
            return;
        }
        container.innerHTML = results.map(sym => `
            <div class="search-result-item" data-symbol="${sym}">
                <div><span class="result-symbol">${sym}</span><span class="result-name"> ${stockDB[sym]?.name || ''}</span></div>
                <div class="result-market">${stockDB[sym]?.market || ''}</div>
            </div>
        `).join('');
        container.querySelectorAll('.search-result-item').forEach(el => {
            el.addEventListener('click', () => {
                const sym = el.getAttribute('data-symbol');
                currentActiveSymbol = sym;
                document.getElementById('currentSymbol').innerText = sym;
                renderChart(sym);
                renderWatchlist();
                document.getElementById('globalSearchInput').value = '';
                container.classList.remove('show');
            });
        });
        container.classList.add('show');
    }

    // 初始化登录后的界面
    function initAfterLogin(username) {
        const userObj = findUser(username);
        if (userObj) {
            currentUserWatchlist = [...(userObj.watchlist || ["AAPL", "TSLA"])];
            sessionStorage.setItem('currentUser', JSON.stringify({ username, watchlist: currentUserWatchlist }));
        } else {
            currentUserWatchlist = ["AAPL", "TSLA"];
        }
        document.getElementById('displayUsername').innerText = username;
        document.getElementById('tradingApp').style.display = 'block';
        document.getElementById('authOverlay').style.display = 'none';
        currentActiveSymbol = currentUserWatchlist.length ? currentUserWatchlist[0] : "AAPL";
        document.getElementById('currentSymbol').innerText = currentActiveSymbol;
        renderChart(currentActiveSymbol);
        renderWatchlist();
        // 事件绑定
        document.getElementById('addCurrentToWatchlist').onclick = () => {
            addToWatchlist(currentActiveSymbol);
        };
        document.getElementById('logoutBtn').onclick = () => { logout(); };
        const searchInput = document.getElementById('globalSearchInput');
        const clearBtn = document.getElementById('clearSearchBtn');
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if (val === '') {
                document.getElementById('searchResults').classList.remove('show');
                return;
            }
            const res = performSearch(val);
            renderSearchResults(res.slice(0, 8));
        });
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            document.getElementById('searchResults').classList.remove('show');
        });
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !document.getElementById('searchResults').contains(e.target)) {
                document.getElementById('searchResults').classList.remove('show');
            }
        });
    }

    // 事件挂载 (登录注册)
    function bindAuthEvents() {
        const loginTab = document.querySelector('[data-tab="login"]');
        const regTab = document.querySelector('[data-tab="register"]');
        const loginDiv = document.getElementById('loginForm');
        const regDiv = document.getElementById('registerForm');
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            regTab.classList.remove('active');
            loginDiv.style.display = 'flex';
            regDiv.style.display = 'none';
        });
        regTab.addEventListener('click', () => {
            regTab.classList.add('active');
            loginTab.classList.remove('active');
            loginDiv.style.display = 'none';
            regDiv.style.display = 'flex';
        });
        document.getElementById('doLoginBtn').addEventListener('click', () => {
            const username = document.getElementById('loginUsername').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            const res = loginUser(username, pwd);
            if (res.success) {
                initAfterLogin(username);
            } else {
                document.getElementById('loginError').innerText = res.msg || "登录失败";
            }
        });
        document.getElementById('doRegisterBtn').addEventListener('click', () => {
            const username = document.getElementById('regUsername').value.trim();
            const pwd = document.getElementById('regPassword').value;
            const regRes = registerUser(username, pwd);
            if (regRes.success) {
                alert("注册成功，请登录");
                // 切换到登录tab
                loginTab.click();
                document.getElementById('loginUsername').value = username;
                document.getElementById('loginPassword').value = '';
                document.getElementById('regError').innerText = '';
            } else {
                document.getElementById('regError').innerText = regRes.msg;
            }
        });
    }

    // 启动时初始化数据库，检查是否已有登录session
    initUserDatabase();
    bindAuthEvents();
    const savedUser = sessionStorage.getItem('currentUser');
    if (savedUser) {
        const parsed = JSON.parse(savedUser);
        const exists = findUser(parsed.username);
        if (exists) {
            initAfterLogin(parsed.username);
        } else {
            sessionStorage.removeItem('currentUser');
            document.getElementById('authOverlay').style.display = 'flex';
        }
    } else {
        document.getElementById('authOverlay').style.display = 'flex';
    }
</script>
</body>
</html>
