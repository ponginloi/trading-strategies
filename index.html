<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TradeWise Pro | Trading Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif; background: #0a0e27; color: #fff; overflow-x: hidden; }
        .trading-container { display: grid; grid-template-columns: 320px 1fr 340px; gap: 1px; background: rgba(255,255,255,0.05); min-height: 100vh; }
        .top-nav { grid-column: 1/-1; background: rgba(10,14,39,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #fff, #4f46e5); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .market-status { font-size: 0.75rem; padding: 4px 12px; background: rgba(0,200,83,0.2); border-radius: 20px; color: #00c853; }
        .search-container { position: relative; flex: 1; max-width: 400px; }
        .search-input-wrapper { display: flex; align-items: center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 6px 16px; }
        .search-input { flex: 1; background: transparent; border: none; color: white; font-size: 0.85rem; padding: 8px 0; outline: none; }
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: rgba(20,24,49,0.98); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); margin-top: 8px; max-height: 300px; overflow-y: auto; z-index: 1000; display: none; }
        .search-results.show { display: block; }
        .search-result-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-result-item:hover { background: rgba(79,70,229,0.3); }
        .result-symbol { font-weight: 600; }
        .user-controls { display: flex; align-items: center; gap: 16px; }
        .user-name { background: rgba(255,255,255,0.1); padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; }
        .btn-icon { background: rgba(255,255,255,0.1); border: none; padding: 8px 16px; border-radius: 12px; color: white; cursor: pointer; }
        .left-panel { background: rgba(10,14,39,0.8); border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; height: calc(100vh - 60px); }
        .panel-header { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 600; display: flex; justify-content: space-between; }
        .add-to-watchlist-btn { background: rgba(79,70,229,0.3); border: none; padding: 4px 12px; border-radius: 20px; color: #4f46e5; cursor: pointer; }
        .watchlist-item { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .watchlist-item:hover { background: rgba(79,70,229,0.2); }
        .watchlist-item.active { background: linear-gradient(135deg, rgba(79,70,229,0.3), rgba(0,200,83,0.1)); border-left: 3px solid #4f46e5; }
        .watchlist-symbol { font-weight: 600; }
        .watchlist-name { font-size: 0.7rem; color: rgba(255,255,255,0.5); }
        .watchlist-price { font-weight: 600; }
        .watchlist-change { font-size: 0.7rem; }
        .remove-stock { background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; margin-left: 8px; opacity: 0; }
        .watchlist-item:hover .remove-stock { opacity: 1; }
        .positive { color: #00c853; }
        .negative { color: #ff3b30; }
        .center-panel { background: rgba(10,14,39,0.6); display: flex; flex-direction: column; }
        .chart-header { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .selected-stock-info { display: flex; align-items: baseline; gap: 12px; }
        .selected-symbol { font-size: 1.5rem; font-weight: 700; }
        .selected-price { font-size: 1.8rem; font-weight: 700; }
        .selected-change { font-size: 0.9rem; padding: 4px 12px; border-radius: 20px; }
        .timeframe-selector { display: flex; gap: 8px; }
        .timeframe-btn { background: rgba(255,255,255,0.1); border: none; padding: 6px 14px; border-radius: 8px; color: white; cursor: pointer; }
        .timeframe-btn.active { background: #4f46e5; }
        .chart-container { flex: 1; padding: 16px; min-height: 450px; }
        #klineChart { width: 100%; height: 500px; }
        .right-panel { background: rgba(10,14,39,0.8); border-left: 1px solid rgba(255,255,255,0.1); overflow-y: auto; height: calc(100vh - 60px); }
        .trade-form { padding: 16px; }
        .order-type { display: flex; gap: 12px; margin-bottom: 20px; }
        .order-type-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .order-type-btn.buy.active { background: #00c853; color: white; }
        .order-type-btn.buy { background: rgba(0,200,83,0.2); color: #00c853; }
        .order-type-btn.sell.active { background: #ff3b30; color: white; }
        .order-type-btn.sell { background: rgba(255,59,48,0.2); color: #ff3b30; }
        .input-group { margin-bottom: 16px; }
        .input-label { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-bottom: 6px; display: block; }
        .input-field { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 10px 12px; color: white; }
        .trade-preview { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin: 16px 0; }
        .preview-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .submit-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .submit-btn.buy { background: #00c853; color: white; }
        .submit-btn.sell { background: #ff3b30; color: white; }
        .balance-card { background: linear-gradient(135deg, rgba(79,70,229,0.3), rgba(0,200,83,0.1)); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .balance-value { font-size: 1.5rem; font-weight: 700; }
        .portfolio-section { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px; }
        .portfolio-item { padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px; }
        .portfolio-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .ranking-container { margin-top: 20px; padding: 12px; background: rgba(79,70,229,0.1); border-radius: 12px; }
        .ranking-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .ranking-rank { width: 40px; }
        .ranking-name { flex: 1; }
        .ranking-value { font-weight: 700; color: #00c853; }
        .github-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); }
        .ai-quick-panel { margin-top: 16px; padding: 12px; background: rgba(79,70,229,0.1); border-radius: 12px; }
        .ai-question-input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 8px 12px; color: white; margin-bottom: 8px; }
        .ai-answer { font-size: 0.75rem; color: rgba(255,255,255,0.7); margin-top: 8px; max-height: 100px; overflow-y: auto; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: rgba(20,24,49,0.95); border-radius: 24px; padding: 32px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.2); }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 40px; z-index: 2000; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    </style>
</head>
<body>
    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2 id="authTitle" style="margin-bottom: 24px; text-align: center;">Login to TradeWise Pro</h2>
            <form id="authForm">
                <input type="text" id="authUsername" placeholder="Username" class="input-field" style="margin-bottom: 12px;">
                <input type="password" id="authPassword" placeholder="Password" class="input-field" style="margin-bottom: 20px;">
                <button type="submit" class="submit-btn" style="background: #4f46e5; margin-bottom: 12px;" id="authSubmitBtn">Login</button>
            </form>
            <div style="text-align: center; font-size: 0.8rem;">Demo Account: <strong>demo</strong> / <strong>demo123</strong></div>
            <div style="text-align: center; margin-top: 12px;"><span id="authSwitch" style="color: #4f46e5; cursor: pointer;">Create new account</span></div>
        </div>
    </div>

    <div class="trading-container" id="mainApp" style="display: none;">
        <div class="top-nav">
            <div class="logo-area"><span class="logo">TradeWise Pro</span><span class="market-status">● Live</span></div>
            <div class="search-container">
                <div class="search-input-wrapper">
                    <span>🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search stocks... AAPL, MSFT, TSLA">
                </div>
                <div class="search-results" id="searchResults"></div>
            </div>
            <div class="user-controls">
                <span class="user-name" id="userNameDisplay"></span>
                <button class="btn-icon" id="refreshBtn">⟳</button>
                <button class="btn-icon" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="left-panel">
            <div class="panel-header">📈 Watchlist <button class="add-to-watchlist-btn" id="addCurrentToWatchlistBtn">+ Add</button></div>
            <div id="watchlistContainer"></div>
        </div>

        <div class="center-panel">
            <div class="chart-header">
                <div class="selected-stock-info">
                    <span class="selected-symbol">AAPL</span>
                    <span class="selected-price" id="currentPrice">$0.00</span>
                    <span class="selected-change" id="currentChange">0.00%</span>
                </div>
                <div class="timeframe-selector">
                    <button class="timeframe-btn" data-timeframe="1D">1D</button>
                    <button class="timeframe-btn" data-timeframe="1W">1W</button>
                    <button class="timeframe-btn active" data-timeframe="1M">1M</button>
                    <button class="timeframe-btn" data-timeframe="3M">3M</button>
                    <button class="timeframe-btn" data-timeframe="1Y">1Y</button>
                </div>
            </div>
            <div class="chart-container"><div id="klineChart"></div></div>
        </div>

        <div class="right-panel">
            <div class="trade-form">
                <div class="order-type">
                    <button class="order-type-btn buy active" id="buyTab">Buy</button>
                    <button class="order-type-btn sell" id="sellTab">Sell</button>
                </div>
                <div class="balance-card">
                    <div class="balance-label">Available Balance</div>
                    <div class="balance-value" id="balance">$100,000.00</div>
                </div>
                <div class="input-group"><label class="input-label">Quantity</label><input type="number" id="tradeShares" class="input-field" value="1" min="1"></div>
                <div class="input-group"><label class="input-label">Price</label><input type="text" id="marketPrice" class="input-field" readonly></div>
                <div class="trade-preview"><div class="preview-row"><span>Total</span><span id="estimatedTotal">$0.00</span></div></div>
                <button class="submit-btn buy" id="executeTradeBtn">Buy</button>
                
                <div class="ranking-container">
                    <div style="margin-bottom: 8px;">🏆 Global Ranking</div>
                    <div id="rankingList"></div>
                </div>
                
                <div class="ai-quick-panel">
                    <div style="margin-bottom: 8px;">🤖 AI Assistant</div>
                    <input type="text" id="aiQuickQuestion" class="ai-question-input" placeholder="Ask about this stock...">
                    <div id="aiQuickAnswer" class="ai-answer">💡 Ask me anything!</div>
                </div>

                <div class="github-section">
                    <div style="margin-bottom: 12px;">☁️ Cloud Sync</div>
                    <input type="text" id="githubRepo" class="input-field" placeholder="username/repo" style="margin-bottom: 8px;">
                    <input type="password" id="githubToken" class="input-field" placeholder="GitHub Token" style="margin-bottom: 8px;">
                    <button id="syncDataBtn" class="submit-btn" style="background: #4f46e5;">💾 Save to Cloud</button>
                    <button id="loadDataBtn" class="submit-btn" style="background: #24292e; margin-top: 8px;">📥 Load from Cloud</button>
                </div>

                <div class="portfolio-section"><div class="panel-header">💼 Positions</div><div id="portfolioContainer"></div></div>
            </div>
        </div>
    </div>

    <script>
        const FINNHUB_API_KEY = 'd8g3tj9r01qlgcuh34c0d8g3tj9r01qlgcuh34cg';
        const DEEPSEEK_API_KEY = "sk-1f33b84b5ed746d09628b7834fc32170";
        
        let currentUser = null;
        let users = {};      // 格式: { "username": { id, username, password } }
        let portfolioData = {}; // 格式: { "userId": { balance, holdings } }
        let watchlist = [];
        let selectedStock = null;
        let currentOrderType = 'buy';
        let klineChart = null;
        let refreshInterval = null;
        let currentTimeframe = '1M';

        const stockDatabase = [
            { symbol: 'AAPL', name: 'Apple Inc.' }, { symbol: 'MSFT', name: 'Microsoft' },
            { symbol: 'GOOGL', name: 'Google' }, { symbol: 'AMZN', name: 'Amazon' },
            { symbol: 'TSLA', name: 'Tesla' }, { symbol: 'NVDA', name: 'NVIDIA' },
            { symbol: 'META', name: 'Meta' }, { symbol: 'JPM', name: 'JPMorgan' }
        ];

        // 加载本地数据
        function loadLocalData() {
            const savedUsers = localStorage.getItem('tradewise_users');
            if (savedUsers) users = JSON.parse(savedUsers);
            const savedPortfolios = localStorage.getItem('tradewise_portfolios');
            if (savedPortfolios) portfolioData = JSON.parse(savedPortfolios);
            
            // 创建默认 demo 用户
            if (!users['demo']) {
                users['demo'] = { id: 'user_demo', username: 'demo', password: 'demo123' };
                localStorage.setItem('tradewise_users', JSON.stringify(users));
            }
            if (!portfolioData['user_demo']) {
                portfolioData['user_demo'] = { balance: 100000, holdings: {} };
                localStorage.setItem('tradewise_portfolios', JSON.stringify(portfolioData));
            }
        }

        function saveUsersToLocal() {
            localStorage.setItem('tradewise_users', JSON.stringify(users));
        }

        function savePortfoliosToLocal() {
            localStorage.setItem('tradewise_portfolios', JSON.stringify(portfolioData));
        }

        // 获取实时价格
        async function getQuote(symbol) {
            try {
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_API_KEY}`);
                const data = await response.json();
                if (data && data.c) {
                    return { price: data.c, changePercent: data.dp };
                }
            } catch(e) {}
            const prices = { 'AAPL': 175, 'MSFT': 420, 'TSLA': 240, 'GOOGL': 138, 'AMZN': 145, 'NVDA': 900 };
            const base = prices[symbol] || 150;
            return { price: base * (1 + (Math.random() - 0.5) * 0.02), changePercent: (Math.random() - 0.5) * 2 };
        }

        async function refreshPrices() {
            for (const stock of watchlist) {
                const quote = await getQuote(stock.symbol);
                stock.price = quote.price;
                stock.changePercent = quote.changePercent;
            }
            if (selectedStock) {
                const quote = await getQuote(selectedStock.symbol);
                selectedStock.price = quote.price;
                selectedStock.changePercent = quote.changePercent;
                document.getElementById('currentPrice').textContent = `$${selectedStock.price.toFixed(2)}`;
                let change = document.getElementById('currentChange');
                change.textContent = `${selectedStock.changePercent >= 0 ? '+' : ''}${selectedStock.changePercent.toFixed(2)}%`;
                change.className = `selected-change ${selectedStock.changePercent >= 0 ? 'positive' : 'negative'}`;
            }
            renderWatchlist();
            updatePortfolio();
            updateRanking();
            if (selectedStock) document.getElementById('marketPrice').value = `$${selectedStock.price.toFixed(2)}`;
            updatePreview();
        }

        // 生成K线
        function generateCandles(symbol, days = 30) {
            const candles = [];
            let price = 150;
            for (let i = 0; i < days; i++) {
                let open = price;
                let close = price * (1 + (Math.random() - 0.5) * 0.03);
                candles.push({ open, high: Math.max(open, close) * 1.01, low: Math.min(open, close) * 0.99, close });
                price = close;
            }
            return candles;
        }

        async function renderKline() {
            if (!selectedStock) return;
            const candles = generateCandles(selectedStock.symbol);
            if (klineChart) klineChart.dispose();
            klineChart = echarts.init(document.getElementById('klineChart'));
            klineChart.setOption({
                title: { text: `${selectedStock.symbol} - Chart`, textStyle: { color: '#fff' } },
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(20,24,49,0.95)', textStyle: { color: '#fff' } },
                xAxis: { type: 'category', data: candles.map((_, i) => i+1), axisLabel: { color: '#fff' } },
                yAxis: { scale: true, axisLabel: { color: '#fff' } },
                series: [{ type: 'candlestick', data: candles.map(c => [c.open, c.close, c.low, c.high]), itemStyle: { color: '#00c853', color0: '#ff3b30' } }],
                backgroundColor: 'transparent'
            });
        }

        function renderWatchlist() {
            const container = document.getElementById('watchlistContainer');
            container.innerHTML = watchlist.map(stock => `
                <div class="watchlist-item ${selectedStock?.symbol === stock.symbol ? 'active' : ''}" onclick="selectStock('${stock.symbol}')">
                    <div><div class="watchlist-symbol">${stock.symbol}</div><div class="watchlist-name">${stock.name}</div></div>
                    <div><div class="watchlist-price">$${stock.price?.toFixed(2) || '0.00'}</div>
                    <div class="watchlist-change ${stock.changePercent >= 0 ? 'positive' : 'negative'}">${stock.changePercent >= 0 ? '+' : ''}${stock.changePercent?.toFixed(2) || '0'}%</div></div>
                    <button class="remove-stock" onclick="removeStock('${stock.symbol}', event)">✕</button>
                </div>
            `).join('');
        }

        window.selectStock = async (symbol) => {
            let stock = watchlist.find(s => s.symbol === symbol);
            if (stock) {
                let quote = await getQuote(symbol);
                selectedStock = { ...stock, price: quote.price, changePercent: quote.changePercent };
                document.getElementById('currentPrice').textContent = `$${selectedStock.price.toFixed(2)}`;
                document.getElementById('marketPrice').value = `$${selectedStock.price.toFixed(2)}`;
                renderWatchlist();
                await renderKline();
                updatePreview();
            }
        };

        window.removeStock = (symbol, event) => {
            event.stopPropagation();
            watchlist = watchlist.filter(s => s.symbol !== symbol);
            localStorage.setItem('tradewise_watchlist', JSON.stringify(watchlist));
            if (selectedStock?.symbol === symbol && watchlist.length) selectStock(watchlist[0].symbol);
            renderWatchlist();
        };

        function addToWatchlist() {
            if (!selectedStock) return;
            if (!watchlist.find(s => s.symbol === selectedStock.symbol)) {
                watchlist.push({ symbol: selectedStock.symbol, name: selectedStock.name });
                localStorage.setItem('tradewise_watchlist', JSON.stringify(watchlist));
                renderWatchlist();
                showToast(`Added ${selectedStock.symbol}`);
            }
        }

        function searchStocks(query) {
            if (!query) { document.getElementById('searchResults').classList.remove('show'); return; }
            let results = stockDatabase.filter(s => s.symbol.toLowerCase().includes(query.toLowerCase()) || s.name.toLowerCase().includes(query.toLowerCase())).slice(0, 8);
            let container = document.getElementById('searchResults');
            if (!results.length) { container.classList.remove('show'); return; }
            container.innerHTML = results.map(s => `<div class="search-result-item" onclick="addStock('${s.symbol}', '${s.name}')"><div class="result-symbol">${s.symbol}</div><div>${s.name}</div></div>`).join('');
            container.classList.add('show');
        }

        window.addStock = async (symbol, name) => {
            if (!watchlist.find(s => s.symbol === symbol)) {
                watchlist.push({ symbol, name });
                localStorage.setItem('tradewise_watchlist', JSON.stringify(watchlist));
                renderWatchlist();
            }
            let quote = await getQuote(symbol);
            selectedStock = { symbol, name, price: quote.price, changePercent: quote.changePercent };
            document.getElementById('currentPrice').textContent = `$${selectedStock.price.toFixed(2)}`;
            document.getElementById('marketPrice').value = `$${selectedStock.price.toFixed(2)}`;
            renderWatchlist();
            await renderKline();
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').classList.remove('show');
        };

        function updatePortfolio() {
            if (!currentUser) return;
            let portfolio = portfolioData[currentUser.id] || { balance: 100000, holdings: {} };
            document.getElementById('balance').textContent = `$${portfolio.balance.toFixed(2)}`;
            let container = document.getElementById('portfolioContainer');
            let holdings = Object.entries(portfolio.holdings || {});
            if (!holdings.length) { container.innerHTML = '<div style="text-align:center;padding:20px;">No positions</div>'; return; }
            container.innerHTML = holdings.map(([symbol, h]) => {
                let stock = watchlist.find(s => s.symbol === symbol);
                let current = stock?.price || h.avgPrice;
                let pnl = (current - h.avgPrice) * h.shares;
                return `<div class="portfolio-item"><div class="portfolio-header"><span>${symbol}</span><span class="${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</span></div>
                        <div><span>${h.shares} shares</span><span> Avg: $${h.avgPrice.toFixed(2)}</span></div></div>`;
            }).join('');
        }

        function updatePreview() {
            let shares = parseInt(document.getElementById('tradeShares').value) || 0;
            document.getElementById('estimatedTotal').textContent = `$${(shares * (selectedStock?.price || 0)).toFixed(2)}`;
        }

        async function executeTrade() {
            if (!currentUser || !selectedStock) return;
            let shares = parseInt(document.getElementById('tradeShares').value);
            if (shares <= 0) return;
            let price = selectedStock.price;
            let total = shares * price;
            let portfolio = portfolioData[currentUser.id] || { balance: 100000, holdings: {} };
            
            if (currentOrderType === 'buy') {
                if (portfolio.balance < total) { showToast('Insufficient balance', true); return; }
                portfolio.balance -= total;
                if (!portfolio.holdings[selectedStock.symbol]) portfolio.holdings[selectedStock.symbol] = { symbol: selectedStock.symbol, shares: 0, avgPrice: 0 };
                let h = portfolio.holdings[selectedStock.symbol];
                h.avgPrice = (h.avgPrice * h.shares + total) / (h.shares + shares);
                h.shares += shares;
                showToast(`Bought ${shares} shares`);
            } else {
                let h = portfolio.holdings[selectedStock.symbol];
                if (!h || h.shares < shares) { showToast('Insufficient shares', true); return; }
                portfolio.balance += total;
                h.shares -= shares;
                if (h.shares === 0) delete portfolio.holdings[selectedStock.symbol];
                showToast(`Sold ${shares} shares`);
            }
            portfolioData[currentUser.id] = portfolio;
            savePortfoliosToLocal();
            updatePortfolio();
            updateRanking();
        }

        // 计算用户总资产
        function calculateTotalValue(userId) {
            let portfolio = portfolioData[userId] || { balance: 100000, holdings: {} };
            let total = portfolio.balance;
            for (let [symbol, h] of Object.entries(portfolio.holdings || {})) {
                let stock = watchlist.find(s => s.symbol === symbol);
                let price = stock?.price || 150;
                total += h.shares * price;
            }
            return total;
        }

        function updateRanking() {
            let rankings = [];
            for (let username in users) {
                let user = users[username];
                let total = calculateTotalValue(user.id);
                rankings.push({ username: user.username, total, userId: user.id });
            }
            rankings.sort((a, b) => b.total - a.total);
            let container = document.getElementById('rankingList');
            if (!rankings.length) { container.innerHTML = '<div>No users</div>'; return; }
            container.innerHTML = rankings.slice(0, 10).map((r, i) => `
                <div class="ranking-item">
                    <div class="ranking-rank">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`}</div>
                    <div class="ranking-name">${r.username} ${currentUser?.username === r.username ? '(you)' : ''}</div>
                    <div class="ranking-value">$${r.total.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                </div>
            `).join('');
        }

        // ============ 用户认证（修复版）============
        function handleLogin() {
            let username = document.getElementById('authUsername').value.trim();
            let password = document.getElementById('authPassword').value;
            
            if (!username || !password) {
                alert('Please enter username and password');
                return false;
            }
            
            let user = users[username];
            if (user && user.password === password) {
                currentUser = user;
                localStorage.setItem('tradewise_currentUser', JSON.stringify(user));
                showMainApp();
                return true;
            } else {
                alert('Invalid username or password');
                return false;
            }
        }

        function handleRegister() {
            let username = document.getElementById('authUsername').value.trim();
            let password = document.getElementById('authPassword').value;
            
            if (!username || !password) {
                alert('Please enter username and password');
                return false;
            }
            
            if (username.length < 3) {
                alert('Username must be at least 3 characters');
                return false;
            }
            
            if (users[username]) {
                alert('Username already exists! Try another one.');
                return false;
            }
            
            // 创建新用户
            let newId = 'user_' + Date.now();
            let newUser = { id: newId, username: username, password: password };
            users[username] = newUser;
            portfolioData[newId] = { balance: 100000, holdings: {} };
            
            // 保存到本地
            saveUsersToLocal();
            savePortfoliosToLocal();
            
            // 自动登录
            currentUser = newUser;
            localStorage.setItem('tradewise_currentUser', JSON.stringify(newUser));
            
            alert(`Account created successfully! Welcome ${username}!`);
            showMainApp();
            return true;
        }

        function handleAuth() {
            let isLoginMode = document.getElementById('authTitle').textContent === 'Login to TradeWise Pro';
            if (isLoginMode) {
                handleLogin();
            } else {
                handleRegister();
            }
        }

        function toggleAuthMode() {
            let title = document.getElementById('authTitle');
            let btn = document.getElementById('authSubmitBtn');
            let switchText = document.getElementById('authSwitch');
            
            if (title.textContent === 'Login to TradeWise Pro') {
                title.textContent = 'Create Account';
                btn.textContent = 'Sign Up';
                switchText.innerHTML = 'Back to Login';
            } else {
                title.textContent = 'Login to TradeWise Pro';
                btn.textContent = 'Login';
                switchText.innerHTML = 'Create new account';
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('tradewise_currentUser');
            if (refreshInterval) clearInterval(refreshInterval);
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('authModal').classList.add('active');
        }

        async function showMainApp() {
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('mainApp').style.display = 'grid';
            document.getElementById('userNameDisplay').textContent = currentUser.username;
            
            // 加载自选股
            let savedWatchlist = localStorage.getItem('tradewise_watchlist');
            if (savedWatchlist) {
                watchlist = JSON.parse(savedWatchlist);
            } else {
                watchlist = [
                    { symbol: 'AAPL', name: 'Apple Inc.' },
                    { symbol: 'MSFT', name: 'Microsoft' },
                    { symbol: 'TSLA', name: 'Tesla Inc.' }
                ];
            }
            
            await refreshPrices();
            if (watchlist.length) await selectStock(watchlist[0].symbol);
            updatePortfolio();
            updateRanking();
            
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => { refreshPrices(); updateRanking(); }, 30000);
        }

        // GitHub 同步
        async function syncToGitHub() {
            let repo = document.getElementById('githubRepo').value.trim();
            let token = document.getElementById('githubToken').value.trim();
            if (!repo || !token) { alert('Enter repo and token'); return; }
            
            let allData = { users, portfolios: portfolioData, watchlist, timestamp: new Date().toISOString() };
            let content = btoa(unescape(encodeURIComponent(JSON.stringify(allData, null, 2))));
            let filename = `tradewise_backup_${currentUser.username}.json`;
            
            try {
                let check = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                let sha = null;
                if (check.ok) { let exist = await check.json(); sha = exist.sha; }
                
                let res = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `TradeWise backup ${new Date().toLocaleString()}`, content, sha })
                });
                if (res.ok) showToast('Synced to GitHub!');
                else showToast('Sync failed', true);
            } catch(e) { showToast('Error syncing', true); }
        }

        async function loadFromGitHub() {
            let repo = document.getElementById('githubRepo').value.trim();
            let token = document.getElementById('githubToken').value.trim();
            if (!repo || !token) { alert('Enter repo and token'); return; }
            
            let filename = `tradewise_backup_${currentUser.username}.json`;
            try {
                let res = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    let data = await res.json();
                    let saved = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    if (saved.users) users = saved.users;
                    if (saved.portfolios) portfolioData = saved.portfolios;
                    if (saved.watchlist) watchlist = saved.watchlist;
                    saveUsersToLocal();
                    savePortfoliosToLocal();
                    localStorage.setItem('tradewise_watchlist', JSON.stringify(watchlist));
                    await refreshPrices();
                    renderWatchlist();
                    updatePortfolio();
                    updateRanking();
                    showToast('Loaded from GitHub!');
                } else showToast('No backup found', true);
            } catch(e) { showToast('Error loading', true); }
        }

        function showToast(msg, isErr = false) {
            let t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            t.style.background = isErr ? 'rgba(255,59,48,0.9)' : 'rgba(0,200,83,0.9)';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        async function askAI() {
            let question = document.getElementById('aiQuickQuestion').value;
            if (!question || !selectedStock) return;
            let div = document.getElementById('aiQuickAnswer');
            div.innerHTML = '🤔 Thinking...';
            try {
                let res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
                    body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: `Stock: ${selectedStock.symbol} at $${selectedStock.price}. Question: ${question}` }], max_tokens: 200 })
                });
                let data = await res.json();
                div.innerHTML = data.choices[0].message.content;
            } catch(e) { div.innerHTML = 'AI unavailable'; }
        }

        // 初始化
        loadLocalData();
        
        // 检查是否已登录
        let savedUser = localStorage.getItem('tradewise_currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            if (currentUser && users[currentUser.username]) {
                showMainApp();
            } else {
                document.getElementById('authModal').classList.add('active');
            }
        } else {
            document.getElementById('authModal').classList.add('active');
        }

        // 事件绑定
        document.getElementById('authForm').addEventListener('submit', (e) => { e.preventDefault(); handleAuth(); });
        document.getElementById('authSwitch').addEventListener('click', toggleAuthMode);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('refreshBtn').addEventListener('click', () => { refreshPrices(); if(selectedStock) renderKline(); });
        document.getElementById('tradeShares').addEventListener('input', updatePreview);
        document.getElementById('executeTradeBtn').addEventListener('click', executeTrade);
        document.getElementById('addCurrentToWatchlistBtn').addEventListener('click', addToWatchlist);
        document.getElementById('syncDataBtn').addEventListener('click', syncToGitHub);
        document.getElementById('loadDataBtn').addEventListener('click', loadFromGitHub);
        document.getElementById('searchInput').addEventListener('input', (e) => searchStocks(e.target.value));
        document.getElementById('buyTab').addEventListener('click', () => {
            currentOrderType = 'buy';
            document.getElementById('buyTab').classList.add('active');
            document.getElementById('sellTab').classList.remove('active');
            document.getElementById('executeTradeBtn').className = 'submit-btn buy';
            document.getElementById('executeTradeBtn').textContent = 'Buy';
        });
        document.getElementById('sellTab').addEventListener('click', () => {
            currentOrderType = 'sell';
            document.getElementById('sellTab').classList.add('active');
            document.getElementById('buyTab').classList.remove('active');
            document.getElementById('executeTradeBtn').className = 'submit-btn sell';
            document.getElementById('executeTradeBtn').textContent = 'Sell';
        });
        document.querySelectorAll('.timeframe-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTimeframe = btn.dataset.timeframe;
                await renderKline();
            });
        });
        let aiTimer;
        document.getElementById('aiQuickQuestion').addEventListener('input', (e) => {
            clearTimeout(aiTimer);
            aiTimer = setTimeout(() => askAI(), 800);
        });
        
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) document.getElementById('searchResults').classList.remove('show');
        });
    </script>
</body>
</html>
